<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Chuck's AI — Treasuries</title>
  <script src="theme.js"></script>
  <link rel="stylesheet" href="styles.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    /* ── TREASURIES PAGE SPECIFIC ── */

    /* Bond grid */
    .bond-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
      gap: 10px;
    }

    /* Bond card */
    .bond-card {
      background: var(--bg-ticker);
      border: 1px solid var(--tint-amber-bd);
      border-radius: var(--r-md);
      padding: 14px 16px 12px;
      position: relative; overflow: hidden;
      backdrop-filter: blur(14px);
      transition: border-color .2s, transform .15s;
    }
    .bond-card::before {
      content: ''; position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--tint-amber-bd), transparent);
    }
    .bond-card:hover { border-color: rgba(240,184,106,.4); transform: translateY(-2px); }
    .bond-card.is-up   { border-color: rgba(61,220,132,.2); }
    .bond-card.is-down { border-color: rgba(240,82,82,.18); }
    .bond-card.is-up   .bond-price { color: var(--up);   text-shadow: 0 0 12px var(--glow-up); }
    .bond-card.is-down .bond-price { color: var(--down); text-shadow: 0 0 12px var(--glow-down); }
    html.light .bond-card { backdrop-filter: none; background: rgba(255,255,255,.85); }

    .bond-sym {
      font-family: 'Space Mono', monospace;
      font-size: 10px; font-weight: 700;
      color: var(--accent3); letter-spacing: .08em;
      margin-bottom: 4px; text-shadow: 0 0 8px rgba(240,184,106,.5);
    }
    .bond-label {
      font-size: 11px; font-weight: 500;
      color: var(--text-primary); margin-bottom: 6px;
    }
    .bond-price {
      font-family: 'Space Mono', monospace;
      font-size: 18px; font-weight: 400;
      color: var(--text-primary); line-height: 1.1; margin-bottom: 4px;
    }
    .bond-chg { font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; }
    .bond-sub { font-size: 10px; color: var(--text-muted); margin-top: 4px; }

    /* Yield curve bar chart */
    .yield-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 1.5rem; margin-top: 1.5rem;
    }
    html.light .yield-card { background: rgba(255,255,255,.8); }

    .yield-title {
      font-family: 'Space Mono', monospace;
      font-size: 10px; font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase; letter-spacing: .12em;
      margin-bottom: 1.25rem;
    }
    .yield-bars {
      display: flex; align-items: flex-end;
      gap: 12px; height: 100px;
    }
    .yield-bar-wrap {
      display: flex; flex-direction: column;
      align-items: center; gap: 5px; flex: 1;
    }
    .yield-bar {
      width: 100%; border-radius: 4px 4px 0 0;
      transition: height .8s ease; min-height: 4px;
    }
    .yield-mat { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--text-muted); }
    .yield-val { font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700; color: var(--accent3); }

    /* Utility */
    .loading-text {
      font-size: 12px; color: var(--text-secondary);
      padding: .6rem 0; display: flex; align-items: center; gap: 8px;
    }
    .spinner {
      display: inline-block; width: 12px; height: 12px; flex-shrink: 0;
      border: 1.5px solid var(--hairline);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fade-in { animation: fadeUp .35s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    .footer-note {
      text-align: center;
      font-family: 'Space Mono', monospace;
      font-size: 9px; color: var(--text-muted);
      letter-spacing: .1em; text-transform: uppercase;
      margin-top: 2rem; padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

<div class="bg-canvas">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  <div class="orb orb4"></div>
</div>

<div id="nav-placeholder"></div>

<div class="container">

  <!-- Page header -->
  <div class="page-header">
    <div>
      <div class="page-title">🏛️ US <span style="color:var(--accent3)">Treasuries</span></div>
      <div class="page-sub">Treasury ETF prices — yield curve 1yr through 30yr · via Finnhub</div>
    </div>
    <div class="header-right">
      <span class="live-dot" style="background:#f0b86a;box-shadow:0 0 8px #f0b86a"></span>
      <span id="clock" style="font-family:'Space Mono',monospace;font-size:11px;color:var(--text-secondary)">--:--:-- ET</span>
      <div class="countdown-badge" id="countdown">AUTO ⟳ 60s</div>
      <button class="refresh-btn" onclick="manualRefresh()">⟳ REFRESH</button>
    </div>
  </div>

  <!-- Bond ETF grid -->
  <div class="section-label lbl-bonds" style="margin-bottom:12px">Yield Curve — ETF Prices</div>
  <div class="bond-grid" id="bond-grid">
    <div class="loading-text"><span class="spinner"></span> Loading treasury data…</div>
  </div>

  <!-- Yield curve bar chart -->
  <div class="yield-card">
    <div class="yield-title">Yield Curve Visualization</div>
    <div class="yield-bars" id="yield-bars">
      <div class="loading-text"><span class="spinner"></span></div>
    </div>
  </div>

  <p class="footer-note">Data · Finnhub · SHV SHY IEI IEF TLT ZROZ · Auto-refresh 60s</p>

</div><!-- /.container -->

<script>
/* ═══════════════════════════════════════
   TREASURIES — Chuck's AI v7
═══════════════════════════════════════ */

const FH_KEY = 'd7kohmpr01qiqbcv6f8gd7kohmpr01qiqbcv6f90';

const BONDS = [
  { sym: 'SHV',  label: '~1 Year',   mat: '1yr',  sub: 'SHV ETF'  },
  { sym: 'SHY',  label: '1–3 Year',  mat: '2yr',  sub: 'SHY ETF'  },
  { sym: 'IEI',  label: '3–7 Year',  mat: '5yr',  sub: 'IEI ETF'  },
  { sym: 'IEF',  label: '7–10 Year', mat: '10yr', sub: 'IEF ETF'  },
  { sym: 'TLT',  label: '20+ Year',  mat: '20yr', sub: 'TLT ETF'  },
  { sym: 'ZROZ', label: '30 Year',   mat: '30yr', sub: 'ZROZ ETF' },
];

/* ── Helpers ── */
function fmtPrice(n, dec = 2) {
  if (n == null || isNaN(n) || n === 0) return '—';
  if (n >= 1000) return '$' + n.toLocaleString('en-US', { minimumFractionDigits: dec, maximumFractionDigits: dec });
  return '$' + Number(n).toFixed(dec);
}
function fmtPct(n) {
  return n == null || isNaN(n) ? '' : (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
}
function pctClass(n) { return n > 0.01 ? 'up' : n < -0.01 ? 'down' : 'flat'; }

/* ── Finnhub fetch ── */
async function fhQuote(sym) {
  const r = await fetch(`https://finnhub.io/api/v1/quote?symbol=${encodeURIComponent(sym)}&token=${FH_KEY}`);
  const d = await r.json();
  if (!d || !d.c || d.c === 0) throw new Error('no data');
  return { price: d.c, pct: ((d.c - d.pc) / d.pc) * 100 };
}

/* ── Clock ── */
function updateClock() {
  const el = document.getElementById('clock');
  if (el) el.textContent = new Date().toLocaleTimeString('en-US', {
    hour: '2-digit', minute: '2-digit', second: '2-digit', timeZone: 'America/New_York'
  }) + ' ET';
}
setInterval(updateClock, 1000);
updateClock();

/* ── Auto-refresh countdown ──
   Pause when the tab is hidden so we don't burn the shared Finnhub
   free-tier budget (60/min across all tabs). Refresh once on return. */
let secsLeft = 60;
const cdEl = document.getElementById('countdown');
setInterval(() => {
  if (document.hidden) return;            // paused while tab is hidden
  secsLeft--;
  if (cdEl) cdEl.textContent = `AUTO ⟳ ${secsLeft}s`;
  if (secsLeft <= 0) { secsLeft = 60; loadBonds(); }
}, 1000);

document.addEventListener('visibilitychange', () => {
  if (!document.hidden) { secsLeft = 60; loadBonds(); }  // refresh on return
});

function manualRefresh() { secsLeft = 60; loadBonds(); }

/* ── Load bond ETFs ── */
async function loadBonds() {
  const grid = document.getElementById('bond-grid');
  if (!grid) return;

  try {
    const results = await Promise.all(BONDS.map(b => fhQuote(b.sym)));
    const bondPrices = results.map(q => q.price);

    /* Bond cards */
    grid.innerHTML = BONDS.map((b, i) => {
      const q   = results[i];
      const cls = pctClass(q.pct);
      const state = cls === 'up' ? 'is-up' : cls === 'down' ? 'is-down' : '';
      return `<div class="bond-card ${state} fade-in" style="animation-delay:${i * .08}s">
        <div class="bond-sym">${b.mat.toUpperCase()}</div>
        <div class="bond-label">${b.label}</div>
        <div class="bond-price">${fmtPrice(q.price)}</div>
        <div class="bond-chg ${cls}">${fmtPct(q.pct)}</div>
        <div class="bond-sub">${b.sub}</div>
      </div>`;
    }).join('');

    /* Yield curve bar chart */
    const max = Math.max(...bondPrices.filter(p => p > 0));
    document.getElementById('yield-bars').innerHTML = BONDS.map((b, i) => {
      const p     = bondPrices[i];
      const h     = p > 0 ? Math.round((p / max) * 88) + 10 : 10;
      const hue   = 30 + i * 18;
      const color = `hsl(${hue},65%,58%)`;
      return `<div class="yield-bar-wrap fade-in" style="animation-delay:${i * .1}s">
        <div class="yield-val">${p > 0 ? fmtPrice(p) : '—'}</div>
        <div class="yield-bar" style="height:${h}px;background:${color};box-shadow:0 0 8px ${color}60"></div>
        <div class="yield-mat">${b.mat}</div>
      </div>`;
    }).join('');

  } catch {
    grid.innerHTML = '<div class="loading-text">Could not load treasury data. Check Finnhub key.</div>';
  }
}

loadBonds();

/* ═══════════════════════════════════════
   NAV INJECT
═══════════════════════════════════════ */
function injectNav(html) {
  const placeholder = document.getElementById('nav-placeholder');
  if (!placeholder) return;
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  Array.from(tmp.childNodes).forEach(node => {
    if (node.nodeName !== 'SCRIPT')
      placeholder.parentNode.insertBefore(node.cloneNode(true), placeholder);
  });
  tmp.querySelectorAll('script').forEach(oldScript => {
    const s = document.createElement('script');
    if (oldScript.src) s.src = oldScript.src;
    else s.textContent = oldScript.textContent;
    document.head.appendChild(s);
  });
  placeholder.remove();
}

fetch('nav.html')
  .then(r => r.text())
  .then(injectNav)
  .catch(() => console.warn('nav.html not found'));
</script>
</body>
</html>
