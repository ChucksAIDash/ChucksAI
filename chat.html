<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Chuck's AI — AI Market Chat</title>
  <script src="theme.js"></script>
  <link rel="stylesheet" href="styles.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>

    /* ── INPUT BAR: fixed to the bottom of the viewport ──────────────────
       This is the only approach that survives:
         1) dynamic nav injection (which changes page height after load)
         2) new messages being appended (which grow the messages div)
         3) mobile browser chrome resizing the viewport on scroll
       The input bar never moves because it's taken entirely out of flow.
    ──────────────────────────────────────────────────────────────────── */
    .chat-input-wrap {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 200;
      display: flex; gap: 10px;
      background: var(--bg-deep);
      border-top: 1px solid var(--border);
      padding: 1rem 1.5rem 1.25rem;
    }
    @media(max-width: 480px) {
      .chat-input-wrap { padding: .75rem 1rem 1rem; }
    }
    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      .chat-input-wrap {
        padding-bottom: calc(1.25rem + env(safe-area-inset-bottom));
      }
      @media(max-width: 480px) {
        .chat-input-wrap {
          padding-bottom: calc(1rem + env(safe-area-inset-bottom));
        }
      }
    }

    .chat-input {
      flex: 1;
      font-family: 'DM Sans', sans-serif; font-size: 14px;
      background: var(--bg-ticker); border: 1px solid var(--border-bright);
      color: var(--text-primary); border-radius: var(--r-md);
      padding: 12px 16px; outline: none; resize: none;
      transition: border-color .15s;
      min-height: 48px; max-height: 120px;
    }
    html.light .chat-input { background: rgba(255,255,255,.9); }
    .chat-input:focus { border-color: var(--accent2); box-shadow: 0 0 0 3px var(--tint-blue); }
    .chat-input::placeholder { color: var(--text-muted); }

    .send-btn {
      font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700;
      background: var(--accent2); color: var(--bg-deep);
      border: none; border-radius: var(--r-md);
      padding: 0 20px; cursor: pointer; transition: all .15s;
      white-space: nowrap; flex-shrink: 0;
      box-shadow: 0 0 18px var(--glow-blue-mid);
    }
    .send-btn:hover  { background: #80d9ff; }
    .send-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* ── PAGE WRAPPER ── */
    .chat-page {
      position: relative; z-index: 1;
      max-width: 900px; margin: 0 auto; width: 100%;
      padding: 1.5rem 2rem 0;
    }
    @media(max-width: 600px) { .chat-page { padding: 1rem 1rem 0; } }

    /* ── PAGE HEADER ── */
    .chat-header {
      margin-bottom: 1rem; padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── QUICK PROMPTS ── */
    .quick-prompts {
      display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 1rem;
    }
    .qp-btn {
      font-size: 11px; color: var(--text-secondary);
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--r-sm); padding: 5px 11px;
      cursor: pointer; transition: all .15s; white-space: nowrap;
    }
    .qp-btn:hover { border-color: var(--accent2); color: var(--accent2); background: rgba(91,200,245,.06); }
    @media(max-width: 600px) { .quick-prompts { display: none; } }

    /* ── MESSAGE THREAD ──────────────────────────────────────────────────
       overflow-y: auto scrolls the messages.
       padding-bottom is set dynamically by sizeChatArea() in JS to exactly
       match the input bar height — ensures the last message is always
       visible above the fixed input bar.
    ──────────────────────────────────────────────────────────────────── */
    .messages {
      overflow-y: auto;
      overflow-x: hidden;
      padding-bottom: 90px; /* default; overridden by sizeChatArea() */
      -webkit-overflow-scrolling: touch;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }

    /* ── MESSAGE BUBBLES ── */
    .msg {
      display: flex; gap: 12px; margin-bottom: 1.25rem;
      animation: fadeUp .3s ease both;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

    .msg-avatar {
      width: 32px; height: 32px; border-radius: var(--r-sm);
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      font-family: 'Space Mono', monospace; font-size: 9px; font-weight: 700;
    }
    .msg.user .msg-avatar { background: var(--glow-blue-soft);  border: 1px solid var(--glow-blue-mid);  color: var(--accent2); }
    .msg.ai   .msg-avatar { background: var(--tint-green); border: 1px solid var(--tint-green-bd); color: var(--accent); }

    .msg-bubble { flex: 1; min-width: 0; }
    .msg-name {
      font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700;
      letter-spacing: .06em; text-transform: uppercase; margin-bottom: 5px;
    }
    .msg.user .msg-name { color: var(--accent2); }
    .msg.ai   .msg-name { color: var(--accent); }

    .msg-text {
      background: var(--bg-ticker); border: 1px solid var(--border);
      border-radius: var(--r-lg); padding: 12px 16px;
      font-size: 14px; line-height: 1.65; color: var(--text-primary);
      word-break: break-word;
    }
    .msg.user .msg-text  { background: var(--tint-blue); border-color: var(--glow-blue-soft); }
    html.light .msg-text           { background: rgba(255,255,255,.9); }
    html.light .msg.user .msg-text { background: rgba(91,200,245,.08); }

    .msg-text p            { margin-bottom: .6rem; }
    .msg-text p:last-child { margin-bottom: 0; }
    .msg-text strong       { color: var(--accent2); }
    .msg-text code {
      font-family: 'Space Mono', monospace; font-size: 12px;
      background: var(--surface-1); padding: 1px 6px; border-radius: 4px;
    }

    /* ── TYPING DOTS ── */
    .typing-dots { display: flex; gap: 5px; padding: 4px 0; }
    .typing-dots span {
      width: 7px; height: 7px; background: var(--text-muted);
      border-radius: 50%; animation: dot 1.4s ease-in-out infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .2s; }
    .typing-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes dot { 0%,80%,100%{transform:scale(.8);opacity:.4} 40%{transform:scale(1);opacity:1} }

    /* ── CLEAR BUTTON ── */
    .clear-btn {
      font-family: 'Space Mono', monospace; font-size: 10px;
      color: var(--text-muted); background: none;
      border: 1px solid var(--border); border-radius: var(--r-sm);
      padding: 4px 10px; cursor: pointer; transition: all .15s;
    }
    .clear-btn:hover { color: var(--down); border-color: rgba(240,82,82,.4); }

  </style>
</head>
<body>

<div class="bg-canvas">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  <div class="orb orb4"></div>
</div>

<div id="nav-placeholder"></div>

<div class="chat-page">

  <!-- Header -->
  <div class="chat-header">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">
      <div>
        <div class="page-title">🤖 AI Market <span style="color:var(--accent)">Chat</span></div>
        <div class="page-sub">Ask anything about markets, crypto, stocks, or economics — powered by Claude</div>
      </div>
      <button class="clear-btn" onclick="clearChat()">✕ CLEAR</button>
    </div>
  </div>

  <!-- Quick prompts -->
  <div class="quick-prompts">
    <button class="qp-btn" onclick="sendQuick(this)">What is the VIX?</button>
    <button class="qp-btn" onclick="sendQuick(this)">Explain Mag 7 stocks</button>
    <button class="qp-btn" onclick="sendQuick(this)">What moves Bitcoin?</button>
    <button class="qp-btn" onclick="sendQuick(this)">What is yield curve inversion?</button>
    <button class="qp-btn" onclick="sendQuick(this)">Fed rate impact on stocks</button>
    <button class="qp-btn" onclick="sendQuick(this)">Explain Fear &amp; Greed Index</button>
    <button class="qp-btn" onclick="sendQuick(this)">Best sectors in a recession?</button>
    <button class="qp-btn" onclick="sendQuick(this)">How do options work?</button>
  </div>

  <!-- Message thread -->
  <div class="messages" id="messages">

    <div class="msg ai">
      <div class="msg-avatar">AI</div>
      <div class="msg-bubble">
        <div class="msg-name">Chuck's AI</div>
        <div class="msg-text">
          Hey Chuck! I'm your AI market assistant. Ask me anything about stocks, crypto, the economy, or trading strategies. Just type below to get started.
        </div>
      </div>
    </div>

    <div class="msg ai" id="typing-indicator" style="display:none">
      <div class="msg-avatar">AI</div>
      <div class="msg-bubble">
        <div class="msg-name">Chuck's AI</div>
        <div class="msg-text">
          <div class="typing-dots"><span></span><span></span><span></span></div>
        </div>
      </div>
    </div>

  </div><!-- /.messages -->

</div><!-- /.chat-page -->

<!-- Fixed input bar — outside .chat-page, anchored to viewport bottom -->
<div class="chat-input-wrap" id="chatInputWrap">
  <textarea
    class="chat-input" id="chat-input"
    placeholder="Ask about markets, crypto, economics…"
    rows="1"
    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"
    oninput="autoResize(this)"
  ></textarea>
  <button class="send-btn" id="send-btn" onclick="sendMessage()">SEND →</button>
</div>

<script>
/* ═══════════════════════════════════════
   CHAT PAGE — Chuck's AI v7
═══════════════════════════════════════ */

const AI_PROXY = 'https://anthropic.infiniti306.workers.dev';
let conversationHistory = [];

/* ── sizeChatArea ────────────────────────────────────────────────────
   Sets messages padding-bottom to exactly the height of the fixed
   input bar. This ensures the last message is never hidden under it.
   Called on load, resize, nav inject, and textarea resize.
──────────────────────────────────────────────────────────────────── */
function sizeChatArea() {
  const inputWrap = document.getElementById('chatInputWrap');
  const messages  = document.getElementById('messages');
  if (!inputWrap || !messages) return;
  const barHeight = inputWrap.getBoundingClientRect().height;
  messages.style.paddingBottom = (barHeight + 16) + 'px';
}

window.addEventListener('resize', sizeChatArea);
sizeChatArea();
setTimeout(sizeChatArea, 300);
setTimeout(sizeChatArea, 800);

/* ── Auto-resize textarea ── */
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  sizeChatArea();
}

/* ── Quick prompt chips ── */
function sendQuick(btn) {
  document.getElementById('chat-input').value = btn.textContent;
  sendMessage();
}

/* ── Clear chat ── */
function clearChat() {
  conversationHistory = [];
  const messages = document.getElementById('messages');
  const typing   = document.getElementById('typing-indicator');
  Array.from(messages.children).forEach(el => {
    if (el.id !== 'typing-indicator') el.remove();
  });
  typing.style.display = 'none';
  messages.appendChild(typing);
}

/* ── Append message bubble ── */
function appendMsg(role, text) {
  const messages = document.getElementById('messages');
  const typing   = document.getElementById('typing-indicator');
  const isAI     = role === 'ai';

  const formatted = text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/`(.*?)`/g, '<code>$1</code>')
    .split('\n\n')
    .map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`)
    .join('');

  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `
    <div class="msg-avatar">${isAI ? 'AI' : 'YOU'}</div>
    <div class="msg-bubble">
      <div class="msg-name">${isAI ? "Chuck's AI" : 'You'}</div>
      <div class="msg-text">${formatted}</div>
    </div>`;

  messages.insertBefore(div, typing);
  messages.scrollTop = messages.scrollHeight;
}

/* ── Send message ── */
async function sendMessage() {
  const input   = document.getElementById('chat-input');
  const sendBtn = document.getElementById('send-btn');
  const text    = input.value.trim();
  if (!text) return;

  appendMsg('user', text);
  conversationHistory.push({ role: 'user', content: text });
  input.value = '';
  input.style.height = 'auto';
  sizeChatArea();
  sendBtn.disabled = true;

  const typing = document.getElementById('typing-indicator');
  typing.style.display = 'flex';
  document.getElementById('messages').scrollTop = 99999;

  try {
    const response = await fetch(`${AI_PROXY}/v1/messages`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5-20250929',
        max_tokens: 1024,
        system: `You are a knowledgeable financial and markets assistant on chucksai.com — a personal AI dashboard built for Chuck. Help with stocks, crypto, ETFs, market data, economic indicators, trading concepts, and financial news. Be concise, clear, and conversational. Format responses with markdown when helpful (**bold** for key terms, bullet points for lists). Always note you are not a financial advisor when giving specific advice.`,
        messages: conversationHistory
      })
    });

    const data = await response.json();
    typing.style.display = 'none';

    if (data.error) {
      appendMsg('ai', `⚠️ Error: ${data.error.message || 'Something went wrong. Please try again.'}`);
    } else {
      const reply = data.content?.[0]?.text || 'No response received.';
      conversationHistory.push({ role: 'assistant', content: reply });
      appendMsg('ai', reply);
    }

  } catch (err) {
    typing.style.display = 'none';
    appendMsg('ai', '⚠️ Connection error. Please check your internet connection and try again.');
  }

  sendBtn.disabled = false;
  input.focus();
}

/* ── Nav inject ── */
function injectNav(html) {
  const placeholder = document.getElementById('nav-placeholder');
  if (!placeholder) return;
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  Array.from(tmp.childNodes).forEach(node => {
    if (node.nodeName !== 'SCRIPT')
      placeholder.parentNode.insertBefore(node.cloneNode(true), placeholder);
  });
  tmp.querySelectorAll('script').forEach(oldScript => {
    const s = document.createElement('script');
    if (oldScript.src) s.src = oldScript.src;
    else s.textContent = oldScript.textContent;
    document.head.appendChild(s);
  });
  placeholder.remove();
  // Re-run after nav reflows the page
  setTimeout(sizeChatArea, 100);
  setTimeout(sizeChatArea, 500);
}

fetch('nav.html')
  .then(r => r.text())
  .then(injectNav)
  .catch(() => console.warn('nav.html not found'));
</script>
</body>
</html>
