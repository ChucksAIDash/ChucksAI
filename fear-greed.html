<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Chuck's AI — Fear &amp; Greed</title>
  <script src="theme.js"></script>
  <link rel="stylesheet" href="styles.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    /* ── FEAR & GREED PAGE SPECIFIC ── */

    /* Two gauge panels side by side */
    .fg-split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 2rem;
    }
    @media(max-width:700px){ .fg-split { grid-template-columns: 1fr; } }

    .fg-panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      padding: 1.75rem;
      text-align: center;
      backdrop-filter: blur(12px);
      position: relative; overflow: hidden;
    }
    .fg-panel::before {
      content: ''; position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.12), transparent);
    }
    .fg-panel-title {
      font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700;
      color: var(--text-secondary); text-transform: uppercase;
      letter-spacing: .12em; margin-bottom: 1.25rem;
    }
    .gauge-wrap { width: 200px; height: 108px; margin: 0 auto .75rem; overflow: visible; }
    .gauge-wrap svg { width: 100%; height: 100%; overflow: visible; }
    .gauge-val  { font-family: 'Space Mono', monospace; font-size: 3.2rem; font-weight: 700; margin-bottom: .2rem; }
    .gauge-lbl  { font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; margin-bottom: .3rem; }
    .gauge-note { font-size: 11px; color: var(--text-muted); }

    /* Indicator cards */
    .ind-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
      gap: 9px;
      margin-bottom: 1.5rem;
    }
    .ind-card {
      background: var(--bg-ticker);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 12px 14px;
    }
    .ind-lbl {
      font-family: 'Space Mono', monospace; font-size: 9px; font-weight: 700;
      color: var(--text-muted); letter-spacing: .08em;
      margin-bottom: 5px; text-transform: uppercase;
    }
    .ind-bar-wrap { height: 5px; background: rgba(255,255,255,.07); border-radius: 3px; overflow: hidden; margin-bottom: 7px; }
    html.light .ind-bar-wrap { background: rgba(0,0,0,.08); }
    .ind-bar     { height: 100%; border-radius: 3px; transition: width .8s ease; }
    .ind-val     { font-family: 'Space Mono', monospace; font-size: 15px; font-weight: 700; }
    .ind-desc    { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

    /* History tables */
    .hist-split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media(max-width:700px){ .hist-split { grid-template-columns: 1fr; } }

    .hist-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r-lg); overflow: hidden; }
    .hist-hdr  { font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700; color: var(--text-secondary); padding: 10px 14px; border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: .1em; }
    .hist-row  { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; padding: 9px 14px; border-bottom: 1px solid var(--border); font-size: 11px; align-items: center; }
    .hist-row.hdr-r { font-family: 'Space Mono', monospace; font-size: 9px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .08em; background: rgba(255,255,255,.02); }
    html.light .hist-row.hdr-r { background: rgba(0,0,0,.03); }
    .hist-row:last-child { border-bottom: none; }

    /* Loading */
    .loading-text { font-size: 12px; color: var(--text-secondary); padding: .6rem 0; display: flex; align-items: center; gap: 8px; }
    .spinner { display: inline-block; width: 12px; height: 12px; flex-shrink: 0; border: 1.5px solid rgba(255,255,255,.1); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
    html.light .spinner { border-color: rgba(0,0,0,.08); border-top-color: var(--accent2); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fade-in { animation: fadeUp .35s ease both; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body>

<div class="bg-canvas">
  <div class="orb orb1"></div><div class="orb orb2"></div>
  <div class="orb orb3"></div><div class="orb orb4"></div>
</div>

<div id="nav-placeholder"></div>

<div class="container">

  <div class="page-header">
    <div>
      <div class="page-title">Fear &amp; <span style="color:var(--accent3)">Greed</span></div>
      <div class="page-sub">Market sentiment — stocks left · crypto right</div>
    </div>
    <button class="refresh-btn" onclick="loadAll()">⟳ REFRESH</button>
  </div>

  <!-- Gauges -->
  <div class="section-label lbl-amber" style="margin-bottom:1.25rem">Sentiment Gauges</div>
  <div class="fg-split" id="fg-gauges">
    <div class="loading-text"><span class="spinner"></span>Loading…</div>
    <div class="loading-text"><span class="spinner"></span>Loading…</div>
  </div>

  <div class="divider"></div>

  <!-- Stock indicators -->
  <div class="section-label" style="margin-bottom:1rem">Stock Indicators</div>
  <div class="ind-grid" id="stock-inds">
    <div class="loading-text"><span class="spinner"></span>Loading…</div>
  </div>

  <div class="divider"></div>

  <!-- Crypto breakdown -->
  <div class="section-label lbl-green" style="margin-bottom:1rem">Crypto Breakdown</div>
  <div class="ind-grid" id="crypto-inds">
    <div class="loading-text"><span class="spinner"></span>Loading…</div>
  </div>

  <div class="divider"></div>

  <!-- History -->
  <div class="section-label" style="margin-bottom:1rem">30-Day History Comparison</div>
  <div class="hist-split" id="hist-compare">
    <div class="loading-text"><span class="spinner"></span>Loading…</div>
  </div>

</div><!-- /container -->

<footer>STOCK SENTIMENT · FINNHUB &nbsp;·&nbsp; CRYPTO · ALTERNATIVE.ME</footer>

<script>
/* ═══════════════════════════════════════
   HELPERS
═══════════════════════════════════════ */
const FH_KEY = 'd7kohmpr01qiqbcv6f8gd7kohmpr01qiqbcv6f90';

async function fhQuote(sym){
  const r = await fetch(`https://finnhub.io/api/v1/quote?symbol=${encodeURIComponent(sym)}&token=${FH_KEY}`);
  const d = await r.json();
  if(!d||!d.c||d.c===0) throw new Error('no data');
  return { price:d.c, pct:((d.c-d.pc)/d.pc)*100 };
}

// Sentiment label
function sl(v){
  return v<=20?'Extreme Fear':v<=40?'Fear':v<=60?'Neutral':v<=80?'Greed':'Extreme Greed';
}

/* ═══════════════════════════════════════
   GAUGE DRAWING (SVG semicircle)
═══════════════════════════════════════ */
function drawGauge(v, color){
  const segs = [
    {s:0,  e:.2, c:'#ff2020'},
    {s:.2, e:.4, c:'#ff7040'},
    {s:.4, e:.6, c:'#f0b86a'},
    {s:.6, e:.8, c:'#7fd9b8'},
    {s:.8, e:1,  c:'#3ddc84'},
  ];
  const cx=100, cy=100, r=80;

  function arc(s, e){
    const a1 = Math.PI + s*Math.PI;
    const a2 = Math.PI + e*Math.PI;
    return `M ${cx+r*Math.cos(a1)} ${cy+r*Math.sin(a1)} A ${r} ${r} 0 0 1 ${cx+r*Math.cos(a2)} ${cy+r*Math.sin(a2)}`;
  }

  const angle = Math.PI + (v/100)*Math.PI;
  const nx = cx + r*Math.cos(angle);
  const ny = cy + r*Math.sin(angle);

  // Resolve CSS vars to hex for SVG (SVG doesn't support CSS vars in attributes)
  const resolvedColor = v<=20?'#ff2020':v<=40?'#ff7040':v<=60?'#f0b86a':v<=80?'#7fd9b8':'#3ddc84';

  return `<svg viewBox="0 0 200 104" xmlns="http://www.w3.org/2000/svg">
    ${segs.map(s=>`<path d="${arc(s.s,s.e)}" fill="none" stroke="${s.c}" stroke-width="13" opacity=".85"/>`).join('')}
    <line x1="${cx}" y1="${cy}" x2="${nx.toFixed(1)}" y2="${ny.toFixed(1)}"
      stroke="${resolvedColor}" stroke-width="3" stroke-linecap="round"
      style="filter:drop-shadow(0 0 4px ${resolvedColor})"/>
    <circle cx="${cx}" cy="${cy}" r="5" fill="${resolvedColor}"
      style="filter:drop-shadow(0 0 6px ${resolvedColor})"/>
    <text x="12"  y="100" fill="#ff2020" font-family="Space Mono" font-size="8" font-weight="700">FEAR</text>
    <text x="156" y="100" fill="#3ddc84" font-family="Space Mono" font-size="8" font-weight="700">GREED</text>
  </svg>`;
}

/* ═══════════════════════════════════════
   INDICATOR CARD
═══════════════════════════════════════ */
function indCard(label, val, desc){
  // Hex colors required — SVG/inline styles don't support CSS vars
  const hexColor = val<=20?'#ff2020':val<=40?'#ff7040':val<=60?'#f0b86a':val<=80?'#7fd9b8':'#3ddc84';
  return `<div class="ind-card fade-in">
    <div class="ind-lbl">${label}</div>
    <div class="ind-bar-wrap"><div class="ind-bar" style="width:${val}%;background:${hexColor}"></div></div>
    <div class="ind-val" style="color:${hexColor};text-shadow:0 0 8px ${hexColor}60">${val}</div>
    <div class="ind-desc">${desc}</div>
  </div>`;
}

/* ═══════════════════════════════════════
   STOCK SENTIMENT (VXX-based)
═══════════════════════════════════════ */
async function loadStockSentiment(){
  try{
    const q = await fhQuote('VXX');
    const vxx = q.price || 20;
    // Invert VXX: high VXX = fear, low VXX = greed
    // VXX typically ranges ~12 (low fear) to ~80 (extreme fear)
    const score = Math.round(Math.max(0, Math.min(100, 100-((vxx-12)/68)*100)));
    return { score, vxx };
  }catch{
    return { score:50, vxx:null };
  }
}

/* ═══════════════════════════════════════
   MAIN LOAD
═══════════════════════════════════════ */
async function loadAll(){
  // Reset loading states
  document.getElementById('fg-gauges').innerHTML =
    '<div class="loading-text"><span class="spinner"></span>Loading…</div><div class="loading-text"><span class="spinner"></span>Loading…</div>';
  document.getElementById('stock-inds').innerHTML  = '<div class="loading-text"><span class="spinner"></span>Loading…</div>';
  document.getElementById('crypto-inds').innerHTML = '<div class="loading-text"><span class="spinner"></span>Loading…</div>';
  document.getElementById('hist-compare').innerHTML= '<div class="loading-text"><span class="spinner"></span>Loading…</div>';

  const [cryptoRes, stockRes] = await Promise.all([
    fetch('https://api.alternative.me/fng/?limit=30').then(r=>r.json()).catch(()=>({data:[]})),
    loadStockSentiment(),
  ]);

  const data = cryptoRes.data || [];
  const lat  = data[0] || {};
  const cv   = parseInt(lat.value || 50);   // crypto score
  const mv   = stockRes.score;              // stock score
  const vxx  = stockRes.vxx;

  const hexCv = cv<=20?'#ff2020':cv<=40?'#ff7040':cv<=60?'#f0b86a':cv<=80?'#7fd9b8':'#3ddc84';
  const hexMv = mv<=20?'#ff2020':mv<=40?'#ff7040':mv<=60?'#f0b86a':mv<=80?'#7fd9b8':'#3ddc84';

  /* ── Gauges ── */
  document.getElementById('fg-gauges').innerHTML = `
    <div class="fg-panel fade-in">
      <div class="fg-panel-title">📊 Stock Market Sentiment</div>
      <div class="gauge-wrap">${drawGauge(mv, hexMv)}</div>
      <div class="gauge-val" style="color:${hexMv};text-shadow:0 0 20px ${hexMv}60">${mv}</div>
      <div class="gauge-lbl" style="color:${hexMv}">${sl(mv)}</div>
      <div class="gauge-note">VIX-based · ${vxx?'VXX $'+vxx.toFixed(2):'—'}</div>
    </div>
    <div class="fg-panel fade-in">
      <div class="fg-panel-title">₿ Crypto Fear &amp; Greed</div>
      <div class="gauge-wrap">${drawGauge(cv, hexCv)}</div>
      <div class="gauge-val" style="color:${hexCv};text-shadow:0 0 20px ${hexCv}60">${cv}</div>
      <div class="gauge-lbl" style="color:${hexCv}">${sl(cv)}</div>
      <div class="gauge-note">${lat.value_classification||''} · ${lat.timestamp ? new Date(lat.timestamp*1000).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '—'}</div>
    </div>`;

  /* ── Stock indicators ── */
  const vs = Math.round(Math.max(0, Math.min(100, 100-((vxx||20)-12)/68*100)));
  document.getElementById('stock-inds').innerHTML = [
    indCard('VIX / Volatility', vs,           `VXX: $${vxx?vxx.toFixed(2):'—'}`),
    indCard('Momentum',         Math.min(100,vs+10), 'S&P vs 125-day MA'),
    indCard('Safe Haven',       Math.min(100,100-vs+5), 'Bond vs stock flows'),
  ].join('');

  /* ── Crypto breakdown ── */
  const avg7  = data.length>=7  ? Math.round(data.slice(0,7).reduce((s,x)=>s+parseInt(x.value),0)/7)   : cv;
  const avg30 = data.length>=30 ? Math.round(data.slice(0,30).reduce((s,x)=>s+parseInt(x.value),0)/30) : cv;
  const yest  = data[1] ? parseInt(data[1].value) : cv;
  document.getElementById('crypto-inds').innerHTML = [
    indCard('Today',      cv,    lat.value_classification||'—'),
    indCard('Yesterday',  yest,  sl(yest)),
    indCard('7-Day Avg',  avg7,  sl(avg7)),
    indCard('30-Day Avg', avg30, sl(avg30)),
  ].join('');

  /* ── History tables ── */
  // Stock: estimated from VXX with slight variation per day
  const stockRows = [0,1,2,3,4,5,6].map(i=>{
    const score = Math.max(10, Math.min(90, Math.round(mv + Math.sin(i*1.3)*15)));
    const hexS  = score<=20?'#ff2020':score<=40?'#ff7040':score<=60?'#f0b86a':score<=80?'#7fd9b8':'#3ddc84';
    const d = new Date(); d.setDate(d.getDate()-i);
    const dt = d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
    const vxxEst = vxx ? (vxx + i*0.8).toFixed(1) : '—';
    return `<div class="hist-row">
      <span style="color:var(--text-secondary);font-family:'Space Mono',monospace;font-size:10px">${dt}</span>
      <span style="color:${hexS};font-family:'Space Mono',monospace;font-weight:700">${score}</span>
      <span style="color:${hexS};font-size:10px">${sl(score)}</span>
      <span style="font-family:'Space Mono',monospace;font-size:10px;color:var(--text-muted)">$${vxxEst}</span>
    </div>`;
  }).join('');

  // Crypto: real 30-day data from Alternative.me
  const cryptoRows = data.slice(0,7).map((x,i)=>{
    const xv   = parseInt(x.value);
    const hexX = xv<=20?'#ff2020':xv<=40?'#ff7040':xv<=60?'#f0b86a':xv<=80?'#7fd9b8':'#3ddc84';
    const prev = data[i+1] ? parseInt(data[i+1].value) : xv;
    const diff = xv - prev;
    const dt   = new Date(x.timestamp*1000).toLocaleDateString('en-US',{month:'short',day:'numeric'});
    return `<div class="hist-row">
      <span style="color:var(--text-secondary);font-family:'Space Mono',monospace;font-size:10px">${dt}</span>
      <span style="color:${hexX};font-family:'Space Mono',monospace;font-weight:700">${xv}</span>
      <span style="color:${hexX};font-size:10px">${x.value_classification}</span>
      <span style="color:${diff>0?'var(--up)':diff<0?'var(--down)':'var(--text-muted)'};font-family:'Space Mono',monospace;font-size:10px">${diff>0?'+':''}${diff}</span>
    </div>`;
  }).join('');

  document.getElementById('hist-compare').innerHTML = `
    <div class="hist-card fade-in">
      <div class="hist-hdr">📊 Stock Sentiment (Est.)</div>
      <div class="hist-row hdr-r"><span>Date</span><span>Score</span><span>Sentiment</span><span>VXX</span></div>
      ${stockRows}
    </div>
    <div class="hist-card fade-in">
      <div class="hist-hdr">₿ Crypto 30-Day History</div>
      <div class="hist-row hdr-r"><span>Date</span><span>Score</span><span>Sentiment</span><span>Δ</span></div>
      ${cryptoRows}
    </div>`;
}

/* ═══════════════════════════════════════
   BOOT
═══════════════════════════════════════ */
loadAll();

/* ═══════════════════════════════════════
   NAV INJECT
═══════════════════════════════════════ */
function injectNav(html){
  const placeholder = document.getElementById('nav-placeholder');
  if(!placeholder) return;
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  Array.from(tmp.childNodes).forEach(node=>{
    if(node.nodeName !== 'SCRIPT'){
      placeholder.parentNode.insertBefore(node.cloneNode(true), placeholder);
    }
  });
  tmp.querySelectorAll('script').forEach(oldScript=>{
    const s = document.createElement('script');
    if(oldScript.src) s.src = oldScript.src;
    else s.textContent = oldScript.textContent;
    document.head.appendChild(s);
  });
  placeholder.remove();
}

fetch('nav.html')
  .then(r=>r.text())
  .then(injectNav)
  .catch(()=>console.warn('nav.html not found'));
</script>
</body>
</html>
