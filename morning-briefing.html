<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Chuck's AI — Morning Briefing</title>
  <script src="theme.js"></script>
  <link rel="stylesheet" href="styles.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    /* ── MORNING BRIEFING PAGE SPECIFIC ── */

    /* API key setup bar */
    .api-setup {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
      display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
    }
    html.light .api-setup { background: rgba(255,255,255,.9); }

    .api-label {
      font-family: 'Space Mono', monospace;
      font-size: 10px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .1em; white-space: nowrap;
    }
    .api-input {
      flex: 1; min-width: 200px;
      font-family: 'Space Mono', monospace; font-size: 11px;
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border-bright);
      color: var(--text-primary);
      border-radius: var(--r-sm); padding: 7px 12px;
      outline: none; transition: border-color .15s;
    }
    html.light .api-input { background: #f8fafc; }
    .api-input:focus { border-color: var(--accent2); box-shadow: 0 0 0 3px rgba(91,200,245,.08); }

    .api-save {
      font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700;
      padding: 7px 16px;
      background: rgba(91,200,245,.12); border: 1px solid rgba(91,200,245,.3);
      color: var(--accent2); border-radius: var(--r-sm);
      cursor: pointer; transition: all .15s;
    }
    .api-save:hover { background: rgba(91,200,245,.22); }

    .key-saved {
      font-family: 'Space Mono', monospace; font-size: 10px;
      color: var(--up); display: none;
    }

    /* Date row */
    .date-row {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 1.5rem; flex-wrap: wrap;
    }
    .date-label {
      font-family: 'Space Mono', monospace;
      font-size: 10px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .1em;
    }
    .date-input {
      font-family: 'Space Mono', monospace; font-size: 12px;
      background: var(--bg-card); border: 1px solid var(--border-bright);
      color: var(--text-primary); border-radius: var(--r-sm);
      padding: 6px 12px; outline: none; cursor: pointer;
      transition: border-color .15s;
    }
    html.light .date-input { background: rgba(255,255,255,.9); }
    .date-input:focus { border-color: var(--accent2); }

    /* Generate button */
    .gen-btn {
      font-family: 'Space Mono', monospace;
      font-size: 12px; font-weight: 700;
      padding: 9px 22px;
      background: var(--accent2); color: var(--bg-deep);
      border: none; border-radius: var(--r-md);
      cursor: pointer; transition: all .2s; letter-spacing: .04em;
      box-shadow: 0 0 20px rgba(91,200,245,.35);
    }
    .gen-btn:hover { background: #80d9ff; box-shadow: 0 0 32px rgba(91,200,245,.55); transform: translateY(-1px); }
    .gen-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    /* Briefing output card */
    .briefing-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--r-lg); padding: 2rem;
      backdrop-filter: blur(12px);
      position: relative; overflow: hidden;
    }
    .briefing-card::before {
      content: ''; position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(91,200,245,.25), transparent);
    }
    html.light .briefing-card { backdrop-filter: none; background: rgba(255,255,255,.9); }

    .briefing-date {
      font-family: 'Space Mono', monospace;
      font-size: 10px; font-weight: 700;
      color: var(--accent2); text-transform: uppercase; letter-spacing: .12em;
      margin-bottom: 1rem; display: flex; align-items: center; gap: 8px;
    }
    .briefing-date::before {
      content: ''; display: block; width: 3px; height: 14px;
      background: var(--accent2); border-radius: 2px;
      box-shadow: 0 0 8px rgba(91,200,245,.7);
    }

    /* Briefing content typography */
    .briefing-content { font-size: 14px; line-height: 1.8; color: var(--text-primary); }
    .briefing-content h2 {
      font-family: 'Space Mono', monospace;
      font-size: 12px; font-weight: 700;
      color: var(--accent2); text-transform: uppercase; letter-spacing: .1em;
      margin: 1.5rem 0 .6rem; padding-bottom: .4rem;
      border-bottom: 1px solid var(--border);
    }
    .briefing-content h2:first-child { margin-top: 0; }
    .briefing-content h3 {
      font-family: 'Space Mono', monospace;
      font-size: 11px; font-weight: 700; color: var(--text-secondary);
      margin: 1rem 0 .4rem;
    }
    .briefing-content p  { margin-bottom: .85rem; color: var(--text-secondary); font-size: 14px; line-height: 1.75; }
    .briefing-content strong { color: var(--text-primary); font-weight: 600; }
    .briefing-content ul { padding-left: 1.2rem; margin-bottom: .85rem; }
    .briefing-content li { color: var(--text-secondary); font-size: 14px; line-height: 1.7; margin-bottom: .3rem; }
    .up-text   { color: var(--up);   font-weight: 700; }
    .down-text { color: var(--down); font-weight: 700; }

    /* Loading / empty states */
    .loading-state { text-align: center; padding: 3rem 1rem; }
    .big-spinner {
      display: inline-block; width: 32px; height: 32px;
      border: 3px solid rgba(255,255,255,.1);
      border-top-color: var(--accent2); border-radius: 50%;
      animation: spin .8s linear infinite; margin-bottom: 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-state p { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--text-secondary); }

    .empty-state  { text-align: center; padding: 3rem 1rem; }
    .empty-icon   { font-size: 3rem; margin-bottom: 1rem; }
    .empty-title  { font-family: 'Space Mono', monospace; font-size: 14px; font-weight: 700; color: var(--text-secondary); margin-bottom: .5rem; }
    .empty-sub    { font-size: 13px; color: var(--text-muted); }

    /* Past briefings history */
    .history-section { margin-top: 2rem; }
    .history-label {
      font-family: 'Space Mono', monospace;
      font-size: 10px; font-weight: 700;
      color: var(--text-secondary); text-transform: uppercase; letter-spacing: .14em;
      display: flex; align-items: center; gap: 9px; margin-bottom: 1rem;
    }
    .history-label::before {
      content: ''; display: block; width: 3px; height: 14px;
      background: var(--accent3); border-radius: 2px;
      box-shadow: 0 0 8px rgba(240,184,106,.7);
    }
    .history-list { display: flex; flex-direction: column; gap: 8px; }
    .history-item {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--r-md); padding: 12px 16px;
      display: flex; align-items: center; cursor: pointer;
      transition: all .15s; gap: 12px;
    }
    .history-item:hover { border-color: var(--border-bright); background: var(--bg-card-hover); }
    html.light .history-item { background: rgba(255,255,255,.8); }

    .history-date    { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--accent2); flex-shrink: 0; }
    .history-preview { font-size: 12px; color: var(--text-muted); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Utility */
    .fade-in { animation: fadeUp .35s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    .footer-note {
      text-align: center;
      font-family: 'Space Mono', monospace;
      font-size: 9px; color: var(--text-muted);
      letter-spacing: .1em; text-transform: uppercase;
      margin-top: 2rem; padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

<div class="bg-canvas">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  <div class="orb orb4"></div>
</div>

<div id="nav-placeholder"></div>

<div class="container">

  <!-- Page header -->
  <div class="page-header">
    <div>
      <div class="page-title">☀️ Morning <span style="color:var(--accent3)">Briefing</span></div>
      <div class="page-sub">AI-generated daily market summary — powered by Claude</div>
    </div>
    <div class="header-right">
      <button class="refresh-btn" onclick="generateBriefing()">⟳ REGENERATE</button>
    </div>
  </div>

  <!-- API key setup -->
  <div class="api-setup">
    <div class="api-label">Anthropic Key:</div>
    <input class="api-input" type="password" id="api-key-input" placeholder="sk-ant-…" autocomplete="off"/>
    <button class="api-save" onclick="saveKey()">SAVE</button>
    <span class="key-saved" id="key-status">✓ Saved</span>
    <span style="font-size:11px;color:var(--text-muted)">
      Free at <a href="https://console.anthropic.com" target="_blank" style="color:var(--accent2)">console.anthropic.com</a>
    </span>
  </div>

  <!-- Date selector + generate button -->
  <div class="date-row">
    <div class="date-label">Briefing for:</div>
    <input class="date-input" type="date" id="briefing-date"/>
    <button class="gen-btn" id="gen-btn" onclick="generateBriefing()">GENERATE BRIEFING →</button>
  </div>

  <!-- Briefing output -->
  <div id="briefing-output">
    <div class="empty-state">
      <div class="empty-icon">☀️</div>
      <div class="empty-title">Ready to generate</div>
      <div class="empty-sub">Add your Anthropic key above and click Generate</div>
    </div>
  </div>

  <!-- Past briefings -->
  <div class="history-section" id="history-section" style="display:none">
    <div class="history-label">Past Briefings</div>
    <div class="history-list" id="history-list"></div>
  </div>

  <p class="footer-note">Powered by Claude Sonnet · Briefings saved locally · chucksai.com</p>

</div><!-- /.container -->

<script>
/* ═══════════════════════════════════════
   MORNING BRIEFING — Chuck's AI v7
═══════════════════════════════════════ */

/* ── API key ── */
let apiKey = localStorage.getItem('cai_anthropic_key') || '';

(function init() {
  /* Pre-fill key if saved */
  if (apiKey) {
    const inp = document.getElementById('api-key-input');
    if (inp) inp.value = apiKey;
    const st = document.getElementById('key-status');
    if (st) st.style.display = 'inline';
  }
  /* Set today's date */
  document.getElementById('briefing-date').value = new Date().toISOString().split('T')[0];
  /* Load history */
  renderHistory();
})();

function saveKey() {
  const k = document.getElementById('api-key-input').value.trim();
  if (!k) return;
  apiKey = k;
  localStorage.setItem('cai_anthropic_key', k);
  const st = document.getElementById('key-status');
  if (st) { st.style.display = 'inline'; setTimeout(() => st.style.display = 'none', 2500); }
}

/* ── History helpers ── */
function getHistory() {
  return JSON.parse(localStorage.getItem('briefing_history') || '[]');
}
function saveHistory(date, content, preview) {
  const hist = getHistory().filter(h => h.date !== date);
  hist.unshift({ date, content, preview, ts: Date.now() });
  localStorage.setItem('briefing_history', JSON.stringify(hist.slice(0, 10)));
}
function renderHistory() {
  const hist = getHistory();
  if (!hist.length) { document.getElementById('history-section').style.display = 'none'; return; }
  document.getElementById('history-section').style.display = 'block';
  document.getElementById('history-list').innerHTML = hist.map(h => `
    <div class="history-item" onclick="loadBriefing('${h.date}')">
      <div class="history-date">${new Date(h.date + 'T12:00:00').toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', year:'numeric' })}</div>
      <div class="history-preview">${h.preview}</div>
      <div style="color:var(--text-muted)">→</div>
    </div>`).join('');
}
function loadBriefing(date) {
  const item = getHistory().find(h => h.date === date);
  if (!item) return;
  document.getElementById('briefing-date').value = date;
  displayBriefing(item.date, item.content);
}

/* ── Display briefing ── */
function displayBriefing(date, rawContent) {
  const dateObj = new Date(date + 'T12:00:00');
  const dateStr = dateObj.toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

  const html = rawContent
    .replace(/^## (.+)$/gm,  '<h2>$1</h2>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^- (.+)$/gm,   '<li>$1</li>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/(\+[\d.]+%)/g,        '<span class="up-text">$1</span>')
    .replace(/((?<!\d)-[\d.]+%)/g,  '<span class="down-text">$1</span>');

  document.getElementById('briefing-output').innerHTML = `
    <div class="briefing-card fade-in">
      <div class="briefing-date">${dateStr}</div>
      <div class="briefing-content"><p>${html}</p></div>
    </div>`;
}

/* ── Generate briefing via Claude ── */
async function generateBriefing() {
  if (!apiKey) { alert('Please enter and save your Anthropic API key first.'); return; }
  const date = document.getElementById('briefing-date').value;
  if (!date) { alert('Please select a date.'); return; }

  const btn = document.getElementById('gen-btn');
  btn.disabled = true; btn.textContent = 'GENERATING…';

  document.getElementById('briefing-output').innerHTML = `
    <div class="loading-state">
      <div class="big-spinner"></div>
      <p>Claude is analyzing markets…</p>
      <p style="margin-top:.5rem;font-size:10px;color:var(--text-muted)">Checking moves, earnings, economic events…</p>
    </div>`;

  const dateObj  = new Date(date + 'T12:00:00');
  const dateStr  = dateObj.toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  const isWeekend = dateObj.getDay() === 0 || dateObj.getDay() === 6;

  const prompt = `You are a professional market analyst writing a morning briefing for ${dateStr}.

Write a comprehensive morning market briefing with these ## Section Headers:

## Market Overview
## Overnight & Pre-Market
## Key Levels to Watch
## Earnings Today
## Economic Events
## Crypto Check
## Chuck's Watchlist
Quick notes on: AAPL, MSFT, NVDA, TSLA, META, AMZN, GOOGL, GME, AMC, ASTS, FUBO
## What to Watch Today
3-5 bullet points

${isWeekend ? 'Note: Weekend — markets closed. Write a week-ahead prep briefing.' : ''}

Direct, professional, conversational tone. Use specific numbers where possible. Use +(X%) for gains and -(X%) for losses.`;

  try {
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 2000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await r.json();
    if (data.error) throw new Error(data.error.message);

    const content = data.content?.[0]?.text || '';
    saveHistory(date, content, content.slice(0, 120).replace(/[#*]/g, '').trim());
    displayBriefing(date, content);
    renderHistory();

  } catch (e) {
    document.getElementById('briefing-output').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <div class="empty-title">Error</div>
        <div class="empty-sub" style="color:var(--down)">${e.message}</div>
      </div>`;
  }

  btn.disabled = false; btn.textContent = 'GENERATE BRIEFING →';
}

/* ═══════════════════════════════════════
   NAV INJECT
═══════════════════════════════════════ */
function injectNav(html) {
  const placeholder = document.getElementById('nav-placeholder');
  if (!placeholder) return;
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  Array.from(tmp.childNodes).forEach(node => {
    if (node.nodeName !== 'SCRIPT')
      placeholder.parentNode.insertBefore(node.cloneNode(true), placeholder);
  });
  tmp.querySelectorAll('script').forEach(oldScript => {
    const s = document.createElement('script');
    if (oldScript.src) s.src = oldScript.src;
    else s.textContent = oldScript.textContent;
    document.head.appendChild(s);
  });
  placeholder.remove();
}

fetch('nav.html')
  .then(r => r.text())
  .then(injectNav)
  .catch(() => console.warn('nav.html not found'));
</script>
</body>
</html>
