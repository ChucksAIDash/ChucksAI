<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Chuck's AI — Discord Feed</title>

  <!-- ① theme.js MUST be first — prevents flash -->
  <script src="theme.js"></script>

  <!-- ② Global design system -->
  <link rel="stylesheet" href="styles.css"/>

  <!-- ③ Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>

  <!-- ④ Page-specific styles ONLY below — never edit styles.css -->
  <style>
    /* ── DISCORD FEED PAGE ── */

    /* Channel tabs (#spx / 3D-printing) */
    .chan-tabs {
      display: flex; gap: 4px; margin-bottom: 18px; flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
    }
    .chan-tab {
      position: relative;
      font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700;
      letter-spacing: .04em;
      color: var(--text-secondary); background: none; border: none;
      padding: 10px 16px 11px; cursor: pointer; transition: color .15s;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
    }
    .chan-tab:hover { color: var(--text-primary); }
    .chan-tab.active {
      color: var(--accent2); border-bottom-color: var(--accent2);
    }
    /* Unread dot on a tab (new posts since last viewed) */
    .chan-tab .chan-dot {
      display: none; position: absolute; top: 7px; right: 6px;
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 0 2px var(--bg-card);
    }
    .chan-tab.has-unread .chan-dot { display: block; }

    /* Scope toggle (Today / All) */
    .feed-controls {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .scope-toggle {
      display: inline-flex; background: var(--bg-card);
      border: 1px solid var(--border); border-radius: 9px; padding: 4px;
    }
    .scope-btn {
      font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700;
      letter-spacing: .06em; text-transform: uppercase;
      color: var(--text-secondary); background: none; border: none;
      padding: 7px 15px; border-radius: 7px; cursor: pointer; transition: all .15s;
    }
    .scope-btn:hover { color: var(--text-primary); }
    .scope-btn.active {
      color: var(--accent2); background: rgba(91,200,245,.08);
      box-shadow: 0 0 0 1px rgba(91,200,245,.22) inset;
    }
    html.light .scope-btn.active { background: var(--tint-blue); box-shadow: 0 0 0 1px var(--tint-blue-bd) inset; }
    .feed-count {
      font-family: 'Space Mono', monospace; font-size: 11px;
      color: var(--text-muted); letter-spacing: .05em;
    }

    /* AI "today's take" summary strip */
    .ai-take {
      position: relative; background: var(--bg-card);
      border: 1px solid var(--border); border-left: 3px solid var(--accent2);
      border-radius: 12px; padding: 18px 20px; margin-bottom: 24px;
    }
    .ai-take-head {
      display: flex; align-items: center; gap: 8px; margin-bottom: 11px;
      font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase; color: var(--accent2);
    }
    .ai-take-body {
      font-family: 'DM Sans', sans-serif; font-size: 15.5px; line-height: 1.65;
      color: var(--text-secondary); white-space: pre-wrap;
    }
    .ai-take.collapsed { display: none; }
    .ai-take-close {
      position: absolute; top: 12px; right: 13px; background: none; border: none;
      color: var(--text-muted); font-size: 15px; cursor: pointer; line-height: 1;
      padding: 2px 5px; border-radius: 6px; transition: all .15s;
    }
    .ai-take-close:hover { color: var(--text-primary); background: var(--bg-card); }
    .ai-take-scope { color: var(--text-muted); font-weight: 400; letter-spacing: .04em; }
    .ai-loading { color: var(--text-muted); font-style: italic; }

    /* AI summarize buttons (in the controls row) */
    .feed-controls-spacer { flex: 1; }
    .ai-btns { display: flex; gap: 8px; }
    .ai-btn {
      font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700;
      letter-spacing: .04em; color: var(--accent2); cursor: pointer;
      background: rgba(91,200,245,.08); border: 1px solid rgba(91,200,245,.28);
      border-radius: 8px; padding: 7px 13px; transition: all .15s; white-space: nowrap;
    }
    .ai-btn:hover { background: rgba(91,200,245,.16); border-color: var(--accent2); }
    .ai-btn.vision { color: var(--accent); background: rgba(127,217,184,.08); border-color: rgba(127,217,184,.3); }
    .ai-btn.vision:hover { background: rgba(127,217,184,.16); border-color: var(--accent); }
    .ai-btn.busy { opacity: .5; pointer-events: none; }
    html.light .ai-btn { background: var(--tint-blue); border-color: var(--tint-blue-bd); }
    html.light .ai-btn.vision { background: var(--tint-green, rgba(127,217,184,.12)); }
    @media (max-width: 600px){
      .feed-controls-spacer { flex-basis: 100%; height: 0; }
      .ai-btns { width: 100%; }
      .ai-btn { flex: 1; text-align: center; }
    }

    /* Day group headers */
    .day-group { margin-bottom: 8px; }
    .day-header {
      display: flex; align-items: center; gap: 12px;
      font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700;
      letter-spacing: .12em; text-transform: uppercase; color: var(--text-muted);
      margin: 22px 0 14px;
    }
    .day-header::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, var(--border-bright), transparent);
    }
    .day-group:first-of-type .day-header { margin-top: 0; }

    /* Message cards */
    .feed-list { display: flex; flex-direction: column; gap: 16px; }
    .msg-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 14px; padding: 18px 20px; transition: border-color .18s, opacity .18s;
    }
    .msg-card:hover { border-color: var(--border-bright); }
    .msg-card.is-read { opacity: .5; }
    .msg-card.is-read:hover { opacity: .75; }
    .msg-head {
      display: flex; align-items: center; gap: 11px; margin-bottom: 11px;
    }
    .msg-avatar {
      width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
      background: var(--accent2); display: grid; place-items: center;
      font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700;
      color: #07101a; overflow: hidden;
    }
    .msg-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .msg-author {
      font-family: 'Space Mono', monospace; font-size: 13.5px; font-weight: 700;
      color: var(--text-primary); letter-spacing: .02em;
    }
    .msg-time {
      font-family: 'Space Mono', monospace; font-size: 11px;
      color: var(--text-muted); letter-spacing: .04em;
    }
    .msg-head-spacer { flex: 1; }
    .msg-body {
      font-family: 'DM Sans', sans-serif; font-size: 16px; line-height: 1.66;
      color: var(--text-secondary); white-space: pre-wrap; word-break: break-word;
    }
    .msg-body a { color: var(--accent2); text-decoration: none; }
    .msg-body a:hover { text-decoration: underline; }

    /* Image attachments */
    .msg-imgs {
      display: flex; flex-wrap: wrap; gap: 12px; margin-top: 14px;
    }
    .msg-img {
      max-width: 100%; border-radius: 11px; border: 1px solid var(--border);
      cursor: zoom-in; display: block; transition: border-color .15s;
    }
    .msg-img:hover { border-color: var(--accent2); }
    .msg-img.single { max-width: 680px; }
    .msg-img.multi  { max-width: 320px; }
    .msg-file {
      display: inline-flex; align-items: center; gap: 6px; margin-top: 12px;
      font-family: 'Space Mono', monospace; font-size: 12px;
      color: var(--accent2); text-decoration: none;
      background: rgba(91,200,245,.07); border: 1px solid rgba(91,200,245,.2);
      border-radius: 8px; padding: 7px 12px;
    }
    .msg-file:hover { border-color: var(--accent2); }

    /* Reactions row */
    .msg-reactions {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 14px;
    }
    .reaction-chip {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: 'Space Mono', monospace; font-size: 12px;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 99px; padding: 4px 11px; cursor: pointer;
      transition: all .15s; color: var(--text-secondary); user-select: none;
    }
    .reaction-chip:hover { border-color: var(--border-bright); color: var(--text-primary); }
    .reaction-chip.me {
      background: rgba(240,184,106,.1); border-color: rgba(240,184,106,.4);
      color: var(--text-primary);
    }
    .reaction-chip .emoji { font-size: 14px; }
    .reaction-chip .count { font-weight: 700; }
    .react-add {
      display: inline-flex; align-items: center; gap: 5px;
      font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700;
      background: none; border: 1px dashed var(--border-bright);
      border-radius: 99px; padding: 4px 12px; cursor: pointer;
      color: var(--text-muted); transition: all .15s;
    }
    .react-add:hover { color: var(--text-primary); border-color: var(--accent); border-style: solid; }
    .react-add.busy { opacity: .5; pointer-events: none; }

    /* Mark-read toggle button on each card */
    .read-btn {
      font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700;
      letter-spacing: .05em; text-transform: uppercase;
      background: none; border: 1px solid var(--border); border-radius: 7px;
      padding: 5px 10px; cursor: pointer; color: var(--text-muted); transition: all .15s;
    }
    .read-btn:hover { color: var(--text-primary); border-color: var(--border-bright); }
    .read-btn.done { color: var(--accent); border-color: rgba(127,217,184,.3); }

    /* States */
    .feed-state {
      text-align: center; padding: 64px 20px;
      font-family: 'Space Mono', monospace; font-size: 13px;
      color: var(--text-muted); letter-spacing: .04em;
    }
    .feed-state .spinner {
      width: 28px; height: 28px; margin: 0 auto 16px;
      border: 2px solid var(--border); border-top-color: var(--accent2);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    .feed-state.error { color: var(--down); }
    .feed-state .hint { display: block; margin-top: 10px; color: var(--text-muted); font-size: 11px; }

    /* Lightbox */
    .lightbox {
      display: none; position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,.88); backdrop-filter: blur(6px);
      place-items: center; padding: 30px;
    }
    .lightbox.open { display: grid; }
    .lightbox img { max-width: 94vw; max-height: 90vh; border-radius: 10px; cursor: zoom-out; }
    .lb-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.18);
      color: #fff; font-size: 26px; width: 50px; height: 64px; border-radius: 10px;
      cursor: pointer; display: grid; place-items: center; transition: background .15s;
    }
    .lb-nav:hover { background: rgba(255,255,255,.18); }
    .lb-prev { left: 22px; } .lb-next { right: 22px; }
    .lb-nav.hidden { display: none; }
    .lb-close {
      position: absolute; top: 20px; right: 24px; font-size: 30px; color: #fff;
      background: none; border: none; cursor: pointer; line-height: 1; opacity: .8;
    }
    .lb-close:hover { opacity: 1; }
    .lb-counter {
      position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
      font-family: 'Space Mono', monospace; font-size: 12px; color: rgba(255,255,255,.8);
      background: rgba(0,0,0,.4); padding: 5px 12px; border-radius: 99px;
    }

    @media (max-width: 600px) {
      .msg-body { font-size: 15.5px; }
      .msg-img.multi { max-width: 100%; }
    }
  </style>
</head>

<body data-page="discord-feed" data-mob="discord-feed">

<!-- Ambient background orbs (standard on all pages) -->
<div class="bg-canvas">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  <div class="orb orb4"></div>
</div>

<!-- Nav injected here -->
<div id="nav-placeholder"></div>

<div class="container">

  <!-- ── PAGE HEADER ── -->
  <div class="page-header">
    <div>
      <div class="page-title">Discord <span style="color:var(--accent2)">Feed</span></div>
      <div class="page-sub">Channel feeds · posts pulled on load + manual refresh</div>
    </div>
    <div class="header-right">
      <button class="refresh-btn" onclick="manualRefresh()">⟳ REFRESH</button>
    </div>
  </div>

  <!-- Channel tabs -->
  <div class="chan-tabs" id="chanTabs"></div>

  <!-- Controls: scope toggle + count + AI summarize buttons -->
  <div class="feed-controls">
    <div class="scope-toggle">
      <button class="scope-btn active" id="scopeToday" onclick="setScope('today')">Today</button>
      <button class="scope-btn" id="scopeAll" onclick="setScope('all')">All Recent</button>
    </div>
    <span class="feed-count" id="feedCount"></span>
    <span class="feed-controls-spacer"></span>
    <div class="ai-btns" id="aiBtns" style="display:none">
      <button class="ai-btn" onclick="runSummary('text')">✨ AI Summarize</button>
      <button class="ai-btn vision" onclick="runSummary('vision')">👁 + Vision</button>
    </div>
  </div>

  <!-- AI summary strip (on-demand) -->
  <div class="ai-take collapsed" id="aiTake">
    <button class="ai-take-close" onclick="document.getElementById('aiTake').classList.add('collapsed')" title="Dismiss">✕</button>
    <div class="ai-take-head">✨ AI Summary <span class="ai-take-scope" id="aiTakeScope"></span></div>
    <div class="ai-take-body" id="aiTakeBody"></div>
  </div>

  <!-- Feed -->
  <div class="feed-list" id="feedList">
    <div class="feed-state"><div class="spinner"></div>Loading #spx feed…</div>
  </div>

</div><!-- /container -->

<!-- Image lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <button class="lb-nav lb-prev" onclick="lbStep(-1)">‹</button>
  <img id="lightboxImg" src="" alt="" onclick="closeLightbox()">
  <button class="lb-nav lb-next" onclick="lbStep(1)">›</button>
  <div class="lb-counter" id="lbCounter"></div>
</div>

<footer>Discord Feed · #spx via Cloudflare Worker proxy · fetch on load</footer>

<script>
/* ═══════════════════════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════════════════════ */
const DISCORD_PROXY = 'https://discord-proxy.infiniti306.workers.dev';
const AI_PROXY = 'https://anthropic.infiniti306.workers.dev';
const ENABLE_AI_TAKE   = true;   // Claude "today's take" summary strip (#spx only)
const ENABLE_REACT     = true;   // two-way 🔥 react button (needs Worker /react route)
const QUICK_EMOJI      = '🔥';   // emoji the "react" button sends
const READ_STORE_KEY   = 'cai_discord_read';   // localStorage key for mark-read
const SEEN_STORE_KEY   = 'cai_discord_seen';   // localStorage: last-seen post time per channel

/* ── CHANNELS ────────────────────────────────────────────────────
   `ids` is an array of Discord channel ids the tab pulls from.
   An empty string '' means "use the Worker default (#spx secret)" —
   keeps spx working without exposing its id client-side.
   A tab with multiple ids fetches each and merges them by time
   (e.g. the General tab = server #general + 3D-printing #general).
   These ids must all be in the Worker's ALLOWED_CHANNELS allow-list. */
const CHANNELS = [
  { key: 'spx', label: '#spx', ids: [''], aiTake: true },
  { key: 'gen', label: 'General', ids: [
      '947004313685876737',    // server's default #general
      '1130908169275711488',   // 3D-printing #general
    ], aiTake: false },
];

let activeChan = CHANNELS[0];          // default tab = #spx
const chanCache = {};                  // { [key]: messages[] }  newest-first
let allMessages = [];                  // active channel's messages
let scope = 'today';                   // 'today' | 'all'
let readSet = loadReadSet();

/* ═══════════════════════════════════════════════════════════
   MARK-READ (local, per-browser)
═══════════════════════════════════════════════════════════ */
function loadReadSet(){
  try { return new Set(JSON.parse(localStorage.getItem(READ_STORE_KEY) || '[]')); }
  catch { return new Set(); }
}
function saveReadSet(){
  try { localStorage.setItem(READ_STORE_KEY, JSON.stringify([...readSet])); } catch {}
}
function toggleRead(id){
  if (readSet.has(id)) readSet.delete(id); else readSet.add(id);
  saveReadSet();
  render();
}

/* ═══════════════════════════════════════════════════════════
   CHANNELS + UNREAD DOTS  (newest-post vs. last-viewed, per channel)
═══════════════════════════════════════════════════════════ */
function loadSeen(){
  try { return JSON.parse(localStorage.getItem(SEEN_STORE_KEY) || '{}'); }
  catch { return {}; }
}
function saveSeen(map){
  try { localStorage.setItem(SEEN_STORE_KEY, JSON.stringify(map)); } catch {}
}
// Newest post time we have for a channel (ms), or 0.
function latestTime(msgs){
  let t = 0;
  for (const m of (msgs||[])) { const ts = new Date(m.timestamp).getTime(); if (ts > t) t = ts; }
  return t;
}
// A channel is "unread" if its newest post is newer than what we last saw.
function chanHasUnread(ch){
  const msgs = chanCache[ch.key];
  if (!msgs || !msgs.length) return false;
  const seen = loadSeen()[ch.key] || 0;
  return latestTime(msgs) > seen;
}
// Mark the active channel as seen (clears its dot).
function markChanSeen(ch){
  const msgs = chanCache[ch.key];
  if (!msgs || !msgs.length) return;
  const map = loadSeen();
  map[ch.key] = Math.max(map[ch.key] || 0, latestTime(msgs));
  saveSeen(map);
}
// Any channel unread? → drives the nav #SPX dot.
function anyChanUnread(){ return CHANNELS.some(chanHasUnread); }

function renderTabs(){
  const wrap = document.getElementById('chanTabs');
  wrap.innerHTML = CHANNELS.map(ch => {
    const active = ch.key === activeChan.key ? ' active' : '';
    const unread = (ch.key !== activeChan.key && chanHasUnread(ch)) ? ' has-unread' : '';
    return `<button class="chan-tab${active}${unread}" onclick="switchChannel('${ch.key}')">`
      + `${escapeHtml(ch.label)}<span class="chan-dot"></span></button>`;
  }).join('');
}

function switchChannel(key){
  const ch = CHANNELS.find(c => c.key === key);
  if (!ch || ch.key === activeChan.key) return;
  activeChan = ch;
  document.getElementById('feedList').innerHTML =
    `<div class="feed-state"><div class="spinner"></div>Loading ${escapeHtml(ch.label)}…</div>`;
  // Show cached instantly if we have it, then refresh in background.
  if (chanCache[ch.key]) { allMessages = chanCache[ch.key]; afterLoad(); }
  loadFeed();
}

// Tell the nav (in nav.html) whether to show the #SPX dot.
function updateNavDot(){
  try {
    const link = document.querySelector('.nav-link[data-page="discord-feed"]');
    if (link) link.classList.toggle('has-unread', anyChanUnread());
  } catch {}
}

/* ═══════════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════════ */
function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, c => (
    {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
  ));
}
function renderText(raw){
  let t = escapeHtml(raw);
  t = t.replace(/(https?:\/\/[^\s<]+)/g,
    '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>');
  return t;
}
function fmtTime(iso){
  const d = new Date(iso);
  return d.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
}
function isToday(iso){
  return new Date(iso).toDateString() === new Date().toDateString();
}
function dayLabel(iso){
  const d = new Date(iso); const now = new Date();
  const yest = new Date(now); yest.setDate(now.getDate() - 1);
  if (d.toDateString() === now.toDateString())  return 'Today';
  if (d.toDateString() === yest.toDateString()) return 'Yesterday';
  return d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
}
function initials(name){ return (name||'?').trim().slice(0,2).toUpperCase(); }

/* ═══════════════════════════════════════════════════════════
   LIGHTBOX  (per-post image set, prev/next)
═══════════════════════════════════════════════════════════ */
let lbImages = [];   // array of urls for the post currently open
let lbIndex = 0;
function openLightbox(urls, startIndex){
  lbImages = urls; lbIndex = startIndex;
  showLb();
  document.getElementById('lightbox').classList.add('open');
}
function showLb(){
  document.getElementById('lightboxImg').src = lbImages[lbIndex];
  const multi = lbImages.length > 1;
  document.querySelector('.lb-prev').classList.toggle('hidden', !multi);
  document.querySelector('.lb-next').classList.toggle('hidden', !multi);
  const counter = document.getElementById('lbCounter');
  counter.textContent = multi ? `${lbIndex+1} / ${lbImages.length}` : '';
  counter.style.display = multi ? 'block' : 'none';
}
function lbStep(dir){
  if (!lbImages.length) return;
  lbIndex = (lbIndex + dir + lbImages.length) % lbImages.length;
  showLb();
}
function closeLightbox(){ document.getElementById('lightbox').classList.remove('open'); }
// stop arrow clicks from bubbling to the close-on-background
document.querySelectorAll('.lb-nav').forEach(b => b.addEventListener('click', e => e.stopPropagation()));
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target.id === 'lightbox') closeLightbox();
});
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  else if (e.key === 'ArrowLeft')  lbStep(-1);
  else if (e.key === 'ArrowRight') lbStep(1);
});

/* ═══════════════════════════════════════════════════════════
   TWO-WAY REACTION  (POST to Worker /react → Discord PUT)
═══════════════════════════════════════════════════════════ */
async function reactToMessage(messageId, emoji, btn, srcChan){
  if (!ENABLE_REACT) return;
  if (btn) btn.classList.add('busy');
  try{
    // srcChan = the message's own channel id (set per-message in merged
    // tabs). Falls back to the active tab's first id for single-channel tabs.
    const channel = srcChan || activeChan.ids[0] || undefined;
    const r = await fetch(`${DISCORD_PROXY}/react`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messageId, emoji, channel: channel || undefined })
    });
    if (!r.ok) throw new Error('react ' + r.status);
    // Optimistic: reflect it immediately, then refetch to get the true count.
    setTimeout(loadFeed, 400);
  }catch(e){
    console.warn('React failed:', e);
    if (btn){ btn.classList.remove('busy'); btn.textContent = '⚠ failed'; }
  }
}

/* ═══════════════════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════════════════ */
function visibleMessages(){
  const msgs = scope === 'today' ? allMessages.filter(m => isToday(m.timestamp)) : allMessages;
  return [...msgs].reverse();   // oldest→newest so the thread reads top to bottom
}

function cardHtml(m){
  const author = escapeHtml(m.author?.global_name || m.author?.username || 'Unknown');
  const avatarUrl = m.author?.id && m.author?.avatar
    ? `https://cdn.discordapp.com/avatars/${m.author.id}/${m.author.avatar}.png?size=64` : null;
  const avatar = avatarUrl
    ? `<span class="msg-avatar"><img src="${avatarUrl}" alt=""></span>`
    : `<span class="msg-avatar">${initials(author)}</span>`;

  const body = m.content ? `<div class="msg-body">${renderText(m.content)}</div>` : '';

  const atts = m.attachments || [];
  const imgs = atts.filter(a => (a.content_type||'').startsWith('image/')
    || /\.(png|jpe?g|gif|webp)$/i.test(a.filename||a.url||''));
  const files = atts.filter(a => !imgs.includes(a));

  const imgUrls = imgs.map(a => a.url);
  const sizeClass = imgs.length === 1 ? 'single' : 'multi';
  const imgsHtml = imgs.length
    ? `<div class="msg-imgs">` + imgs.map((a, i) =>
        `<img class="msg-img ${sizeClass}" src="${a.url}" alt="${escapeHtml(a.filename||'chart')}" loading="lazy"
              onclick='openLightbox(${JSON.stringify(imgUrls).replace(/'/g,"&#39;")}, ${i})'>`
      ).join('') + `</div>`
    : '';

  const filesHtml = files.map(a =>
    `<a class="msg-file" href="${a.url}" target="_blank" rel="noopener noreferrer">📎 ${escapeHtml(a.filename||'attachment')}</a>`
  ).join('');

  // Reactions: existing ones from Discord + the quick-add button.
  // sc = this message's source channel id (set on merged tabs); passed
  // to /react so the reaction lands on the right channel.
  const sc = m._chan || '';
  const rxs = m.reactions || [];
  const rxHtml = rxs.map(rx => {
    const e = rx.emoji?.name || '❓';
    const meClass = rx.me ? ' me' : '';
    return `<span class="reaction-chip${meClass}" onclick="reactToMessage('${m.id}', '${e}', this, '${sc}')">`
      + `<span class="emoji">${escapeHtml(e)}</span><span class="count">${rx.count}</span></span>`;
  }).join('');
  const reactRow = ENABLE_REACT || rxs.length
    ? `<div class="msg-reactions">${rxHtml}`
      + (ENABLE_REACT ? `<button class="react-add" onclick="reactToMessage('${m.id}', '${QUICK_EMOJI}', this, '${sc}')">${QUICK_EMOJI} React</button>` : '')
      + `</div>`
    : '';

  const isRead = readSet.has(m.id);
  const readBtn = `<button class="read-btn${isRead?' done':''}" onclick="toggleRead('${m.id}')">${isRead?'✓ Read':'Mark read'}</button>`;

  return `<div class="msg-card fade-in${isRead?' is-read':''}">
    <div class="msg-head">
      ${avatar}
      <span class="msg-author">${author}</span>
      <span class="msg-time">${fmtTime(m.timestamp)}</span>
      <span class="msg-head-spacer"></span>
      ${readBtn}
    </div>
    ${body}
    ${imgsHtml}
    ${filesHtml}
    ${reactRow}
  </div>`;
}

function render(){
  const list = document.getElementById('feedList');
  const countEl = document.getElementById('feedCount');
  const msgs = visibleMessages();

  if (!msgs.length){
    list.innerHTML = `<div class="feed-state">No ${scope === 'today' ? 'posts yet today' : 'recent posts'}.`
      + (scope === 'today' ? '<span class="hint">Try “All Recent” to see earlier posts.</span>' : '')
      + `</div>`;
    countEl.textContent = '';
    return;
  }

  countEl.textContent = `${msgs.length} post${msgs.length===1?'':'s'}` + (scope === 'today' ? ' today' : '');

  if (scope === 'today'){
    list.innerHTML = msgs.map(cardHtml).join('');
    return;
  }

  // All Recent → group by day with headers.
  let html = ''; let curDay = null;
  for (const m of msgs){
    const lbl = dayLabel(m.timestamp);
    if (lbl !== curDay){
      if (curDay !== null) html += `</div>`;        // close previous group
      html += `<div class="day-group"><div class="day-header">${lbl}</div>`;
      curDay = lbl;
    }
    html += cardHtml(m);
  }
  if (curDay !== null) html += `</div>`;
  list.innerHTML = html;
}

function setScope(s){
  scope = s;
  document.getElementById('scopeToday').classList.toggle('active', s === 'today');
  document.getElementById('scopeAll').classList.toggle('active', s === 'all');
  render();
}

/* ═══════════════════════════════════════════════════════════
   AI SUMMARY  (on-demand: text  OR  text + vision)
   Scope = today's "session". If today's posts span >6h with a gap,
   only the latest cluster is used (so a morning summary = the morning;
   regenerate at night and it = the evening batch).
═══════════════════════════════════════════════════════════ */
const SESSION_GAP_MS = 6 * 60 * 60 * 1000;   // 6h gap splits sessions
const VISION_MODEL = 'claude-sonnet-4-5-20250929';   // vision-capable
const TEXT_MODEL   = 'claude-haiku-4-5-20251001';    // text-only, cheap

// The most recent "session" of posts, oldest→newest. Prefers today; if
// today is empty (weekend/quiet day), falls back to the latest session
// that DOES have posts (e.g. Friday's). Returns {msgs, isToday}.
function sessionMessages(){
  const all = [...allMessages]
    .filter(m => m.content || (m.attachments||[]).length)
    .sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));   // oldest→newest
  if (!all.length) return { msgs: [], isToday: false };

  // Walk back from the newest post, grouping until a >6h gap. That cluster
  // is the latest session — whatever day it lands on.
  let startIdx = all.length - 1;
  for (let i = all.length - 1; i > 0; i--){
    const gap = new Date(all[i].timestamp) - new Date(all[i-1].timestamp);
    if (gap > SESSION_GAP_MS) { startIdx = i; break; }
    startIdx = i - 1;
  }
  const msgs = all.slice(startIdx);
  return { msgs, isToday: isToday(msgs[msgs.length-1].timestamp) };
}

function imageUrlsFrom(msgs){
  const urls = [];
  for (const m of msgs){
    for (const a of (m.attachments || [])){
      const isImg = (a.content_type||'').startsWith('image/')
        || /\.(png|jpe?g|gif|webp)$/i.test(a.filename || a.url || '');
      if (isImg && a.url) urls.push(a.url);
    }
  }
  return urls;
}

// Shared runner. mode = 'text' | 'vision'. Renders into the #aiTake strip.
async function runSummary(mode){
  const take = document.getElementById('aiTake');
  const body = document.getElementById('aiTakeBody');
  const { msgs, isToday: isTodaySess } = sessionMessages();
  if (!msgs.length){
    take.classList.remove('collapsed');
    document.getElementById('aiTakeScope').textContent = '';
    body.textContent = 'No recent #spx posts to summarize.';
    return;
  }

  // When the latest session isn't today (weekend/quiet day), tell the model
  // and label the output with the actual date so it's never mistaken for today.
  const sessDate = new Date(msgs[msgs.length-1].timestamp)
    .toLocaleDateString('en-US', { weekday:'long', month:'short', day:'numeric' });

  const transcript = msgs
    .map(m => `${m.author?.global_name || m.author?.username || '?'}: ${m.content || '(image)'}`)
    .join('\n');
  const imgUrls = mode === 'vision' ? imageUrlsFrom(msgs) : [];

  // Build the message content. For vision, interleave text + image blocks.
  let content;
  const whenPhrase = isTodaySess ? `today’s` : `the most recent session’s (${sessDate})`;
  const instruction = `These are ${whenPhrase} #spx market-analysis posts from a Discord channel`
    + (mode === 'vision' ? ` (charts attached as images)` : ``) + `. `
    + `Summarize the key takeaways in 4-6 tight sentences: levels, bias, and any setups mentioned. `
    + (mode === 'vision' ? `Read the charts and reference specific annotated levels you see. ` : ``)
    + `Be concrete.\n\nPosts:\n${transcript}`;

  if (mode === 'vision' && imgUrls.length){
    content = [{ type: 'text', text: instruction }];
    for (const url of imgUrls){
      content.push({ type: 'image', source: { type: 'url', url } });
    }
  } else {
    content = instruction;
  }

  // Scope label: date (if not today) + time span + count.
  const first = new Date(msgs[0].timestamp), last = new Date(msgs[msgs.length-1].timestamp);
  const tf = d => d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  document.getElementById('aiTakeScope').textContent =
    `· ${isTodaySess ? 'Today' : sessDate} · ${msgs.length} posts, ${tf(first)}–${tf(last)}`
    + (mode==='vision' ? ` · ${imgUrls.length} charts` : '');

  take.classList.remove('collapsed');
  body.innerHTML = `<span class="ai-loading">Summarizing ${mode === 'vision'
    ? imgUrls.length + ' chart' + (imgUrls.length===1?'':'s') + ' + text' : (isTodaySess ? 'today’s posts' : sessDate + '’s posts')}…</span>`;
  setSummaryBusy(true);

  try{
    const r = await fetch(`${AI_PROXY}/v1/messages`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: mode === 'vision' ? VISION_MODEL : TEXT_MODEL,
        max_tokens: 600,
        messages: [{ role: 'user', content }]
      })
    });
    if (!r.ok) throw new Error('AI proxy ' + r.status);
    const data = await r.json();
    if (data.error) throw new Error(data.error.message || 'proxy error');
    const text = data?.content?.[0]?.text || data?.text || '';
    body.textContent = text.trim() || 'No summary returned.';
  }catch(e){
    console.warn('Summary failed:', e);
    body.textContent = '⚠ Summary unavailable — ' + e.message;
  }finally{
    setSummaryBusy(false);
  }
}

function setSummaryBusy(b){
  document.querySelectorAll('.ai-btn').forEach(btn => {
    btn.classList.toggle('busy', b);
    btn.disabled = b;
  });
}

// Show the summarize buttons only on channels flagged aiTake (e.g. #spx).
function updateAiControls(){
  const btns = document.getElementById('aiBtns');
  if (!btns) return;
  btns.style.display = (ENABLE_AI_TAKE && activeChan.aiTake) ? 'flex' : 'none';
  // Hide a stale summary when switching channels.
  if (!activeChan.aiTake) document.getElementById('aiTake').classList.add('collapsed');
}

/* ═══════════════════════════════════════════════════════════
   DATA FETCH
═══════════════════════════════════════════════════════════ */
// Runs after messages for the active channel are in `allMessages`.
function afterLoad(){
  render();
  updateAiControls();    // show/hide the summarize buttons for this channel
  renderTabs();          // refresh other tabs' unread dots
  markChanSeen(activeChan);   // viewing this channel clears its own dot
  renderTabs();          // re-render so the now-seen tab shows no dot
  updateNavDot();        // nav #SPX dot reflects remaining unread channels
}

// Fetch one Discord channel id ('' = Worker default #spx). Returns msgs[].
async function fetchOne(id){
  const qs = `limit=50` + (id ? `&channel=${encodeURIComponent(id)}` : '');
  const r = await fetch(`${DISCORD_PROXY}/messages?${qs}`);
  if (!r.ok) throw new Error('Proxy returned ' + r.status);
  const data = await r.json();
  return Array.isArray(data) ? data : (data.messages || []);
}

// Fetch all ids for a channel-tab and merge newest-first. De-dupes by
// message id and tags each msg with its source channel id (for /react).
async function fetchChannel(ch){
  const batches = await Promise.all(ch.ids.map(async id => {
    const msgs = await fetchOne(id);
    return msgs.map(m => ({ ...m, _chan: id }));   // remember source channel
  }));
  const seen = new Set();
  const merged = [];
  for (const m of batches.flat()){
    if (seen.has(m.id)) continue;
    seen.add(m.id);
    merged.push(m);
  }
  merged.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));  // newest-first
  return merged;
}

async function loadFeed(){
  const list = document.getElementById('feedList');
  const ch = activeChan;
  try{
    const msgs = await fetchChannel(ch);
    chanCache[ch.key] = msgs;
    if (ch.key === activeChan.key){ allMessages = msgs; afterLoad(); }
  }catch(e){
    console.error('Discord feed load error:', e);
    if (ch.key === activeChan.key){
      list.innerHTML = `<div class="feed-state error">⚠ Couldn't load the feed.`
        + `<span class="hint">${escapeHtml(e.message)} — check the Worker route &amp; bot token.</span></div>`;
      document.getElementById('feedCount').textContent = '';
    }
  }
}

// Quietly refresh every channel's cache (for tab dots) without
// disturbing the channel currently on screen.
async function refreshAllChannels(){
  for (const ch of CHANNELS){
    try{ chanCache[ch.key] = await fetchChannel(ch); }
    catch{ /* ignore — dots just won't update this round */ }
  }
  // Repaint the active channel + dots with fresh data.
  if (chanCache[activeChan.key]) allMessages = chanCache[activeChan.key];
  afterLoad();
}

function manualRefresh(){ loadFeed(); }

/* ═══════════════════════════════════════════════════════════
   PRE-MARKET AUTO-POLL
   Light poll while the page is open, only during the window the
   friend posts (weekdays ~5:30–8:30am CST). Outside it, stay manual.
   Uses the browser's local time; Chuck is on CST.
═══════════════════════════════════════════════════════════ */
const POLL_MS = 60000;   // 60s
function inPostingWindow(){
  const now = new Date();
  const day = now.getDay();                 // 0 Sun … 6 Sat
  if (day === 0 || day === 6) return false;  // weekends: he says nothing posts
  const mins = now.getHours() * 60 + now.getMinutes();
  return mins >= (5*60 + 30) && mins <= (8*60 + 30);   // 5:30–8:30am
}
function startAutoPoll(){
  setInterval(() => {
    if (document.hidden) return;     // don't poll a backgrounded tab
    if (inPostingWindow()) refreshAllChannels();
  }, POLL_MS);
}

/* ═══════════════════════════════════════════════════════════
   BOOT
═══════════════════════════════════════════════════════════ */
renderTabs();
loadFeed();                 // active channel (#spx) first, for fast paint
refreshAllChannels();       // prime other channels so tab dots are accurate
startAutoPoll();

/* ═══════════════════════════════════════════════════════════
   NAV INJECT  (standard on all pages — do not modify)
═══════════════════════════════════════════════════════════ */
function injectNav(html){
  const placeholder = document.getElementById('nav-placeholder');
  if(!placeholder) return;
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  Array.from(tmp.childNodes).forEach(node=>{
    if(node.nodeName !== 'SCRIPT'){
      placeholder.parentNode.insertBefore(node.cloneNode(true), placeholder);
    }
  });
  tmp.querySelectorAll('script').forEach(oldScript=>{
    const s = document.createElement('script');
    if(oldScript.src) s.src = oldScript.src;
    else s.textContent = oldScript.textContent;
    document.head.appendChild(s);
  });
  placeholder.remove();
}
fetch('nav.html').then(r => r.text()).then(injectNav).catch(() => console.warn('nav.html not found'));
