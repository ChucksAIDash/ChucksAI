<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Chuck's AI — IPO Calendar</title>
  <script src="theme.js"></script>
  <link rel="stylesheet" href="styles.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    /* ── DATE RANGE TOGGLE ── */
    .range-toggle {
      display: flex; gap: 5px; flex-wrap: wrap;
    }
    .range-btn {
      font-family: 'Space Mono', monospace;
      font-size: 10px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
      padding: 6px 14px; border-radius: 99px;
      border: 1px solid var(--border); color: var(--text-muted);
      cursor: pointer; transition: all .18s; background: none;
    }
    .range-btn:hover { border-color: var(--border-bright); color: var(--text-secondary); }
    .range-btn.active {
      background: rgba(91,200,245,.12); border-color: rgba(91,200,245,.35);
      color: var(--accent2); box-shadow: 0 0 12px rgba(91,200,245,.18);
    }

    /* ── STATUS FILTER BAR ── */
    .filter-bar {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }
    .filter-lbl {
      font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: .1em;
      text-transform: uppercase; color: var(--text-muted);
    }
    .filter-btn {
      font-family: 'Space Mono', monospace; font-size: 9px; font-weight: 700;
      letter-spacing: .08em; text-transform: uppercase;
      padding: 4px 12px; border-radius: 99px;
      border: 1px solid var(--border); background: none; color: var(--text-muted);
      cursor: pointer; transition: all .15s;
    }
    .filter-btn:hover { color: var(--text-secondary); border-color: var(--border-bright); }
    .filter-btn.active { background: rgba(255,255,255,.07); border-color: var(--border-bright); color: var(--text-primary); }
    .filter-btn[data-status="expected"].active  { background: rgba(91,200,245,.1);  border-color: rgba(91,200,245,.35);  color: var(--accent2); }
    .filter-btn[data-status="priced"].active    { background: rgba(61,220,132,.1);  border-color: rgba(61,220,132,.3);   color: var(--up); }
    .filter-btn[data-status="filed"].active     { background: rgba(240,184,106,.1); border-color: rgba(240,184,106,.3);  color: var(--accent3); }
    .filter-btn[data-status="withdrawn"].active { background: rgba(240,82,82,.1);   border-color: rgba(240,82,82,.25);   color: var(--down); }

    /* ── SUMMARY CHIPS ── */
    .stat-chips {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.25rem;
    }
    .stat-chip {
      font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700;
      padding: 5px 12px; border-radius: 99px;
      border: 1px solid var(--border); background: var(--bg-card);
      color: var(--text-secondary); letter-spacing: .04em;
    }
    .stat-chip span { margin-left: 5px; }
    .c-blue   { color: var(--accent2); }
    .c-green  { color: var(--up); }
    .c-amber  { color: var(--accent3); }
    .c-red    { color: var(--down); }

    /* ── DATE GROUP ── */
    .date-group { margin-bottom: 1.75rem; }
    .date-group-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: .65rem;
    }
    .date-label {
      font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700;
      letter-spacing: .12em; text-transform: uppercase; color: var(--text-secondary);
      white-space: nowrap;
    }
    .date-today {
      font-family: 'Space Mono', monospace; font-size: 8px; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      padding: 2px 8px; border-radius: 99px;
      background: rgba(91,200,245,.12); color: var(--accent2);
      border: 1px solid rgba(91,200,245,.3);
    }
    .date-line {
      flex: 1; height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
    }

    /* ── IPO ROW CARD ── */
    .ipo-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--r-lg); padding: 1rem 1.1rem;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 6px 16px;
      align-items: start;
      transition: border-color .18s, box-shadow .18s, transform .18s;
      margin-bottom: 8px;
      position: relative; overflow: hidden;
    }
    .ipo-card::before {
      content: ''; position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.07), transparent);
    }
    .ipo-card:hover {
      border-color: var(--border-bright);
      box-shadow: 0 6px 22px rgba(0,0,0,.4);
      transform: translateY(-1px);
    }
    .ipo-card.status-priced    { border-color: rgba(61,220,132,.2);  background: rgba(61,220,132,.04); }
    .ipo-card.status-expected  { border-color: rgba(91,200,245,.18); background: rgba(91,200,245,.03); }
    .ipo-card.status-withdrawn { border-color: rgba(240,82,82,.18);  background: rgba(240,82,82,.03); }
    .ipo-card.status-filed     { border-color: rgba(240,184,106,.18);background: rgba(240,184,106,.03); }

    /* Left column */
    .ipo-left {}
    .ipo-name {
      font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700;
      color: var(--text-primary); letter-spacing: -.01em; margin-bottom: 3px;
    }
    .ipo-meta {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .ipo-sym {
      font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700;
      letter-spacing: .08em; color: var(--accent2);
    }
    .ipo-exch {
      font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: .06em;
      color: var(--text-muted); background: rgba(255,255,255,.06);
      border: 1px solid var(--border); border-radius: 4px; padding: 1px 7px;
    }
    html.light .ipo-exch { background: #f4f6fa; border-color: #dde2ea; }

    /* Right column */
    .ipo-right {
      display: flex; flex-direction: column; align-items: flex-end; gap: 5px;
    }
    .status-badge {
      font-family: 'Space Mono', monospace; font-size: 9px; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      padding: 3px 10px; border-radius: 99px;
    }
    .badge-expected  { background: rgba(91,200,245,.12);  color: var(--accent2);  border: 1px solid rgba(91,200,245,.3); }
    .badge-priced    { background: rgba(61,220,132,.12);  color: var(--up);       border: 1px solid rgba(61,220,132,.3); }
    .badge-filed     { background: rgba(240,184,106,.12); color: var(--accent3);  border: 1px solid rgba(240,184,106,.3); }
    .badge-withdrawn { background: rgba(240,82,82,.12);   color: var(--down);     border: 1px solid rgba(240,82,82,.25); }

    .ipo-price {
      font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700;
      color: var(--text-primary);
    }
    .ipo-price-lbl {
      font-family: 'Space Mono', monospace; font-size: 8px; color: var(--text-muted);
      letter-spacing: .06em; text-transform: uppercase;
    }

    /* Bottom details row (full width) */
    .ipo-details {
      grid-column: 1 / -1;
      display: flex; gap: 16px; flex-wrap: wrap; margin-top: 2px;
    }
    .ipo-detail {
      font-family: 'DM Sans', sans-serif; font-size: 11px; color: var(--text-muted);
    }
    .ipo-detail strong {
      font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700;
      color: var(--text-secondary);
    }

    /* ── EMPTY STATE ── */
    .ipo-empty {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 3rem 1rem; gap: 10px;
      border: 1px solid var(--border); border-radius: var(--r-lg);
      background: var(--bg-card);
    }
    .ipo-empty-icon { font-size: 2.5rem; }
    .ipo-empty-text {
      font-family: 'Space Mono', monospace; font-size: 11px;
      color: var(--text-muted); letter-spacing: .06em; text-align: center;
    }

    /* ── LOADING ── */
    .ipo-loading {
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 14px; padding: 3rem 0;
    }
    .ipo-spinner {
      width: 36px; height: 36px; border-radius: 50%;
      border: 3px solid var(--border); border-top-color: var(--accent2);
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .ipo-loading-text {
      font-family: 'Space Mono', monospace; font-size: 11px;
      color: var(--text-muted); letter-spacing: .07em;
    }

    /* ── UPDATED ROW ── */
    .updated-row {
      display: flex; align-items: center; gap: 8px;
      font-family: 'Space Mono', monospace; font-size: 9px;
      color: var(--text-muted); letter-spacing: .05em;
      margin-bottom: 1.25rem;
    }
    .updated-row a { color: var(--accent2); cursor: pointer; text-decoration: underline; text-underline-offset: 2px; }
    .updated-row a:hover { opacity: .8; }

    @media (max-width: 520px) {
      .ipo-card { grid-template-columns: 1fr; }
      .ipo-right { align-items: flex-start; flex-direction: row; flex-wrap: wrap; }
    }
  </style>
</head>
<body data-page="ipo" data-mob="ipo">

  <div class="bg-canvas">
    <div class="orb orb1"></div><div class="orb orb2"></div>
    <div class="orb orb3"></div><div class="orb orb4"></div>
  </div>

  <div id="nav-placeholder"></div>

  <div class="container">

    <!-- Page header -->
    <div class="page-header">
      <div>
        <div class="page-title"><span class="live-dot"></span> IPO Calendar</div>
        <div class="page-sub">Upcoming &amp; Recent IPOs · Finnhub</div>
      </div>
      <div class="header-right">
        <div class="range-toggle" id="rangeToggle">
          <button class="range-btn active" data-range="month">This Month</button>
          <button class="range-btn" data-range="quarter">3 Months</button>
          <button class="range-btn" data-range="back">Past Month</button>
        </div>
        <button class="refresh-btn" id="refreshBtn">↺ Refresh</button>
      </div>
    </div>

    <!-- Updated row -->
    <div class="updated-row">
      <span id="updatedTs">—</span>
      · <a onclick="loadIPOs()">refresh now</a>
    </div>

    <!-- Summary chips -->
    <div class="stat-chips" id="statChips">
      <div class="stat-chip">Expected <span class="c-blue" id="chipExpected">—</span></div>
      <div class="stat-chip">Priced <span class="c-green" id="chipPriced">—</span></div>
      <div class="stat-chip">Filed <span class="c-amber" id="chipFiled">—</span></div>
      <div class="stat-chip">Withdrawn <span class="c-red" id="chipWithdrawn">—</span></div>
      <div class="stat-chip">Total Value <span id="chipValue" style="margin-left:5px;color:var(--text-primary)">—</span></div>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar">
      <span class="filter-lbl">Filter:</span>
      <button class="filter-btn active" data-status="all">All</button>
      <button class="filter-btn" data-status="expected">Expected</button>
      <button class="filter-btn" data-status="priced">Priced</button>
      <button class="filter-btn" data-status="filed">Filed</button>
      <button class="filter-btn" data-status="withdrawn">Withdrawn</button>
    </div>

    <!-- IPO list -->
    <div id="ipoWrap">
      <div class="ipo-loading">
        <div class="ipo-spinner"></div>
        <div class="ipo-loading-text">Fetching IPO data…</div>
      </div>
    </div>

  </div><!-- /container -->

  <footer>
    <span>Chuck's AI · IPO Calendar · Data: Finnhub · &copy; 2025</span>
  </footer>

  <script>
  // ── CONFIG ──────────────────────────────────────────────────────────────────
  const FINNHUB_KEY = 'd7kohmpr01qiqbcv6f8gd7kohmpr01qiqbcv6f90';

  let activeRange  = 'month';
  let activeFilter = 'all';
  let allIPOs = [];

  // ── NAV INJECT ──────────────────────────────────────────────────────────────
  function injectNav(html) {
    const placeholder = document.getElementById('nav-placeholder');
    if (!placeholder) return;
    const tmp = document.createElement('div');
    tmp.innerHTML = html;
    Array.from(tmp.childNodes).forEach(node => {
      if (node.nodeName !== 'SCRIPT')
        placeholder.parentNode.insertBefore(node.cloneNode(true), placeholder);
    });
    tmp.querySelectorAll('script').forEach(old => {
      const s = document.createElement('script');
      if (old.src) s.src = old.src; else s.textContent = old.textContent;
      document.head.appendChild(s);
    });
    placeholder.remove();
  }
  fetch('nav.html').then(r => r.text()).then(injectNav).catch(() => {});

  // ── DATE HELPERS ────────────────────────────────────────────────────────────
  function fmtDate(d) {
    return d.toISOString().slice(0, 10);
  }

  function getDateRange(range) {
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    let from, to;
    if (range === 'month') {
      from = today;
      to   = new Date(today); to.setMonth(to.getMonth() + 1);
    } else if (range === 'quarter') {
      from = today;
      to   = new Date(today); to.setMonth(to.getMonth() + 3);
    } else { // back
      from = new Date(today); from.setMonth(from.getMonth() - 1);
      to   = today;
    }
    return { from: fmtDate(from), to: fmtDate(to) };
  }

  function formatDisplayDate(dateStr) {
    // dateStr = "YYYY-MM-DD"
    const [y, m, d] = dateStr.split('-').map(Number);
    const date = new Date(y, m - 1, d);
    return date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
  }

  function isToday(dateStr) {
    return dateStr === fmtDate(new Date());
  }

  // ── FORMAT HELPERS ──────────────────────────────────────────────────────────
  function fmtShares(n) {
    if (!n) return '—';
    if (n >= 1e9) return (n / 1e9).toFixed(1) + 'B';
    if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
    if (n >= 1e3) return (n / 1e3).toFixed(0) + 'K';
    return n.toLocaleString();
  }

  function fmtValue(n) {
    if (!n || n === 0) return '—';
    if (n >= 1e9) return '$' + (n / 1e9).toFixed(2) + 'B';
    if (n >= 1e6) return '$' + (n / 1e6).toFixed(0) + 'M';
    return '$' + n.toLocaleString();
  }

  function statusBadge(s) {
    const map = {
      expected:  '<span class="status-badge badge-expected">Expected</span>',
      priced:    '<span class="status-badge badge-priced">Priced</span>',
      filed:     '<span class="status-badge badge-filed">Filed</span>',
      withdrawn: '<span class="status-badge badge-withdrawn">Withdrawn</span>',
    };
    return map[s?.toLowerCase()] || `<span class="status-badge badge-filed">${s || '—'}</span>`;
  }

  // ── FETCH ───────────────────────────────────────────────────────────────────
  async function loadIPOs() {
    const wrap = document.getElementById('ipoWrap');
    wrap.innerHTML = `<div class="ipo-loading"><div class="ipo-spinner"></div><div class="ipo-loading-text">Fetching IPO data…</div></div>`;
    document.getElementById('updatedTs').textContent = 'Loading…';

    const { from, to } = getDateRange(activeRange);
    const url = `https://finnhub.io/api/v1/calendar/ipo?from=${from}&to=${to}&token=${FINNHUB_KEY}`;

    try {
      const resp = await fetch(url);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();
      allIPOs = (data.ipoCalendar || []).sort((a, b) => a.date.localeCompare(b.date));
      renderIPOs();
      document.getElementById('updatedTs').textContent =
        'Updated ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    } catch (err) {
      wrap.innerHTML = `
        <div class="ipo-empty">
          <div class="ipo-empty-icon">⚠️</div>
          <div class="ipo-empty-text">${err.message}<br>Check your connection and try again.</div>
          <button class="btn" onclick="loadIPOs()" style="margin-top:8px">↺ Retry</button>
        </div>`;
    }
  }

  // ── RENDER ──────────────────────────────────────────────────────────────────
  function renderIPOs() {
    const wrap = document.getElementById('ipoWrap');

    // Filter
    const filtered = activeFilter === 'all'
      ? allIPOs
      : allIPOs.filter(ipo => (ipo.status || '').toLowerCase() === activeFilter);

    // Summary chips from full list
    const count = s => allIPOs.filter(i => (i.status || '').toLowerCase() === s).length;
    document.getElementById('chipExpected').textContent  = count('expected');
    document.getElementById('chipPriced').textContent    = count('priced');
    document.getElementById('chipFiled').textContent     = count('filed');
    document.getElementById('chipWithdrawn').textContent = count('withdrawn');

    const totalVal = allIPOs.reduce((sum, i) => sum + (i.totalSharesValue || 0), 0);
    document.getElementById('chipValue').textContent = fmtValue(totalVal);

    if (filtered.length === 0) {
      wrap.innerHTML = `
        <div class="ipo-empty">
          <div class="ipo-empty-icon">📋</div>
          <div class="ipo-empty-text">No IPOs found for this range / filter.</div>
        </div>`;
      return;
    }

    // Group by date
    const byDate = {};
    filtered.forEach(ipo => {
      if (!byDate[ipo.date]) byDate[ipo.date] = [];
      byDate[ipo.date].push(ipo);
    });

    wrap.innerHTML = '';

    Object.keys(byDate).sort().forEach(date => {
      const group = document.createElement('div');
      group.className = 'date-group';

      const todayBadge = isToday(date) ? '<span class="date-today">Today</span>' : '';
      group.innerHTML = `
        <div class="date-group-header">
          <span class="date-label">${formatDisplayDate(date)}</span>
          ${todayBadge}
          <div class="date-line"></div>
          <span style="font-family:'Space Mono',monospace;font-size:9px;color:var(--text-muted);white-space:nowrap">${byDate[date].length} IPO${byDate[date].length > 1 ? 's' : ''}</span>
        </div>
      `;

      byDate[date].forEach(ipo => {
        const statusKey = (ipo.status || 'filed').toLowerCase();
        const priceDisplay = ipo.price && ipo.price !== '0' ? `$${ipo.price}` : '—';

        const card = document.createElement('div');
        card.className = `ipo-card status-${statusKey}`;
        card.innerHTML = `
          <div class="ipo-left">
            <div class="ipo-name">${ipo.name || '—'}</div>
            <div class="ipo-meta">
              ${ipo.symbol ? `<span class="ipo-sym">${ipo.symbol}</span>` : ''}
              ${ipo.exchange ? `<span class="ipo-exch">${ipo.exchange}</span>` : ''}
            </div>
          </div>
          <div class="ipo-right">
            ${statusBadge(ipo.status)}
            <div style="text-align:right">
              <div class="ipo-price">${priceDisplay}</div>
              <div class="ipo-price-lbl">Price Range</div>
            </div>
          </div>
          <div class="ipo-details">
            <div class="ipo-detail">Shares Offered: <strong>${fmtShares(ipo.numberOfShares)}</strong></div>
            <div class="ipo-detail">Total Value: <strong>${fmtValue(ipo.totalSharesValue)}</strong></div>
          </div>
        `;
        group.appendChild(card);
      });

      wrap.appendChild(group);
    });
  }

  // ── EVENT WIRING ────────────────────────────────────────────────────────────
  document.getElementById('rangeToggle').addEventListener('click', e => {
    const btn = e.target.closest('.range-btn');
    if (!btn) return;
    document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeRange = btn.dataset.range;
    loadIPOs();
  });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.status;
      renderIPOs();
    });
  });

  document.getElementById('refreshBtn').addEventListener('click', loadIPOs);

  // ── INIT ─────────────────────────────────────────────────────────────────────
  loadIPOs();
  </script>
</body>
</html>
