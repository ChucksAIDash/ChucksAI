<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Chuck's AI — Crypto</title>
  <script src="theme.js"></script>
  <link rel="stylesheet" href="styles.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    /* ── CRYPTO PAGE SPECIFIC ── */

    /* Large crypto cards */
    .crypto-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 12px;
    }
    @media(max-width:600px){
      .crypto-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 9px; }
    }

    .crypto-big {
      background: var(--bg-ticker);
      border: 1px solid rgba(91,200,245,.18);
      border-radius: var(--r-lg);
      padding: 20px 22px 16px;
      backdrop-filter: blur(14px);
      position: relative; overflow: hidden;
      transition: transform .15s, border-color .2s, box-shadow .2s;
      cursor: default;
    }
    .crypto-big::before {
      content: ''; position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(91,200,245,.35), transparent);
    }
    .crypto-big:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(0,0,0,.5); }
    .crypto-big.is-up   { border-color: rgba(61,220,132,.35); }
    .crypto-big.is-down { border-color: rgba(240,82,82,.3); }

    .cb-sym {
      font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700;
      color: var(--accent2); letter-spacing: .1em; margin-bottom: 7px;
      text-shadow: 0 0 10px rgba(91,200,245,.5);
    }
    .cb-price {
      font-family: 'Space Mono', monospace; font-size: 22px; font-weight: 400;
      line-height: 1.1; color: var(--text-primary);
    }
    .crypto-big.is-up   .cb-price { color: var(--up);   text-shadow: 0 0 18px rgba(61,220,132,.6); }
    .crypto-big.is-down .cb-price { color: var(--down); text-shadow: 0 0 18px rgba(240,82,82,.6); }

    .cb-chg { font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700; margin-top: 4px; }
    .crypto-big.is-up   .cb-chg { color: var(--up);   text-shadow: var(--up-glow); }
    .crypto-big.is-down .cb-chg { color: var(--down); text-shadow: var(--down-glow); }
    .crypto-big.is-flat .cb-chg { color: var(--text-secondary); }

    .cb-name { font-size: 11px; color: var(--text-muted); margin-top: 6px; }
    .cb-24h  { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--text-muted); margin-top: 2px; letter-spacing: .06em; }

    /* Loading */
    .loading-text {
      font-size: 12px; color: var(--text-secondary);
      padding: .6rem 0; display: flex; align-items: center; gap: 8px;
    }
    .spinner {
      display: inline-block; width: 12px; height: 12px; flex-shrink: 0;
      border: 1.5px solid rgba(255,255,255,.1);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    html.light .spinner { border-color: rgba(0,0,0,.08); border-top-color: var(--accent2); }
    @keyframes spin { to { transform: rotate(360deg); } }

    .fade-in { animation: fadeUp .35s ease both; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

    /* Market summary bar */
    .summary-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 8px;
      margin-bottom: 20px;
    }
    .sum-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 10px 14px;
    }
    .sum-label { font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: .14em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px; }
    .sum-val   { font-family: 'Space Mono', monospace; font-size: 14px; font-weight: 700; color: var(--text-primary); }
  </style>
</head>
<body>

<div class="bg-canvas">
  <div class="orb orb1"></div><div class="orb orb2"></div>
  <div class="orb orb3"></div><div class="orb orb4"></div>
</div>

<div id="nav-placeholder"></div>

<div class="container">

  <!-- Page header -->
  <div class="page-header">
    <div>
      <div class="page-title">Crypto <span style="color:var(--accent)">Live Prices</span></div>
      <div class="page-sub">Real-time via Coinbase · 24h change</div>
    </div>
    <div class="header-right">
      <div class="countdown-badge" id="countdown">AUTO ⟳ 60s</div>
      <button class="refresh-btn" onclick="manualRefresh()">⟳ REFRESH</button>
    </div>
  </div>

  <!-- Market summary -->
  <div class="summary-bar" id="summaryBar">
    <div class="sum-card"><div class="sum-label">Total Coins</div><div class="sum-val" id="sumTotal">10</div></div>
    <div class="sum-card"><div class="sum-label">Gainers</div><div class="sum-val" id="sumUp">—</div></div>
    <div class="sum-card"><div class="sum-label">Losers</div><div class="sum-val" id="sumDown">—</div></div>
    <div class="sum-card"><div class="sum-label">Best 24h</div><div class="sum-val" id="sumBest">—</div></div>
    <div class="sum-card"><div class="sum-label">Worst 24h</div><div class="sum-val" id="sumWorst">—</div></div>
  </div>

  <!-- Coins grid -->
  <div class="section-label lbl-green" style="margin-bottom:12px">All Coins</div>
  <div class="crypto-grid" id="crypto-grid">
    <div class="loading-text"><span class="spinner"></span>Loading…</div>
  </div>

</div><!-- /container -->

<footer>CRYPTO · COINBASE PUBLIC API · NO KEY REQUIRED · AUTO-REFRESH 60s</footer>

<script>
/* ═══════════════════════════════════════
   HELPERS
═══════════════════════════════════════ */
function fmtPct(n){ return n==null||isNaN(n)?'—':(n>=0?'+':'')+n.toFixed(2)+'%'; }
function pctClass(n){ return n>0.05?'up':n<-0.05?'down':'flat'; }

/* ═══════════════════════════════════════
   CLOCK & AUTO-REFRESH
═══════════════════════════════════════ */
let secsLeft = 60;
const cdEl = document.getElementById('countdown');
setInterval(()=>{
  secsLeft--;
  if(cdEl) cdEl.textContent = `AUTO ⟳ ${secsLeft}s`;
  if(secsLeft <= 0){ secsLeft = 60; loadCrypto(); }
}, 1000);

function manualRefresh(){ secsLeft = 60; if(cdEl) cdEl.textContent='AUTO ⟳ 60s'; loadCrypto(); }

/* ═══════════════════════════════════════
   COINS LIST
═══════════════════════════════════════ */
const COINS = [
  {id:'BTC-USD',  label:'BTC',  name:'Bitcoin',    dec:2},
  {id:'ETH-USD',  label:'ETH',  name:'Ethereum',   dec:2},
  {id:'SOL-USD',  label:'SOL',  name:'Solana',     dec:2},
  {id:'LTC-USD',  label:'LTC',  name:'Litecoin',   dec:2},
  {id:'ADA-USD',  label:'ADA',  name:'Cardano',    dec:4},
  {id:'AVAX-USD', label:'AVAX', name:'Avalanche',  dec:2},
  {id:'LINK-USD', label:'LINK', name:'Chainlink',  dec:2},
  {id:'DOGE-USD', label:'DOGE', name:'Dogecoin',   dec:4},
  {id:'SHIB-USD', label:'SHIB', name:'Shiba Inu',  dec:8},
  {id:'XLM-USD',  label:'XLM',  name:'Stellar',    dec:4},
];

/* ═══════════════════════════════════════
   LOAD CRYPTO
═══════════════════════════════════════ */
async function loadCrypto(){
  const el = document.getElementById('crypto-grid');
  if(!el) return;

  try{
    // Fetch spot and 24h historic simultaneously for all coins
    const [spots, hists] = await Promise.all([
      Promise.all(COINS.map(c=>
        fetch(`https://api.coinbase.com/v2/prices/${c.id}/spot`)
          .then(r=>r.json()).catch(()=>null)
      )),
      Promise.all(COINS.map(c=>
        fetch(`https://api.coinbase.com/v2/prices/${c.id}/historic?period=day`)
          .then(r=>r.json()).catch(()=>null)
      )),
    ]);

    // Build data objects
    const data = COINS.map((coin, i)=>{
      const price  = parseFloat(spots[i]?.data?.amount || 0);
      const prices = hists[i]?.data?.prices || [];
      // Coinbase historic: newest first, so last entry = 24h ago
      const old    = prices.length ? parseFloat(prices[prices.length-1]?.price || price) : price;
      const pct    = old && old !== price ? ((price-old)/old)*100 : 0;
      return { ...coin, price, pct };
    });

    // Update summary bar
    const gainers = data.filter(d=>d.pct>0);
    const losers  = data.filter(d=>d.pct<0);
    const sorted  = [...data].filter(d=>d.price>0).sort((a,b)=>b.pct-a.pct);
    const best    = sorted[0] || null;
    const worst   = sorted.length>1 ? sorted[sorted.length-1] : null;

    document.getElementById('sumUp').textContent   = gainers.length;
    document.getElementById('sumDown').textContent = losers.length;

    const bestEl  = document.getElementById('sumBest');
    bestEl.textContent = best  ? `${best.label} ${fmtPct(best.pct)}`   : '—';
    bestEl.className   = 'sum-val ' + (best  ? pctClass(best.pct)  : '');

    const worstEl = document.getElementById('sumWorst');
    worstEl.textContent = worst ? `${worst.label} ${fmtPct(worst.pct)}` : '—';
    worstEl.className   = 'sum-val ' + (worst ? pctClass(worst.pct) : '');

    // Render cards
    el.innerHTML = data.map((coin, i)=>{
      const cls   = pctClass(coin.pct);
      const state = cls==='up'?'is-up':cls==='down'?'is-down':'is-flat';
      // Scale font size for very small prices
      const fs    = coin.price<0.00001?'13px':coin.price<0.001?'15px':coin.price<1?'18px':'22px';
      const priceStr = coin.price>0 ? '$'+coin.price.toFixed(coin.dec) : '—';
      return `<div class="crypto-big ${state} fade-in" style="animation-delay:${i*.04}s">
        <div class="cb-sym">${coin.label}</div>
        <div class="cb-price" style="font-size:${fs}">${priceStr}</div>
        <div class="cb-chg">${coin.pct!==0?fmtPct(coin.pct):'—'}</div>
        <div class="cb-name">${coin.name}</div>
        <div class="cb-24h">24h change</div>
      </div>`;
    }).join('');

  }catch(e){
    el.innerHTML = '<div class="loading-text">Could not load crypto data. Try refreshing.</div>';
    console.error('Crypto load error:', e);
  }
}

/* ═══════════════════════════════════════
   BOOT
═══════════════════════════════════════ */
loadCrypto();

/* ═══════════════════════════════════════
   NAV INJECT
═══════════════════════════════════════ */
function injectNav(html){
  const placeholder = document.getElementById('nav-placeholder');
  if(!placeholder) return;
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  Array.from(tmp.childNodes).forEach(node=>{
    if(node.nodeName !== 'SCRIPT'){
      placeholder.parentNode.insertBefore(node.cloneNode(true), placeholder);
    }
  });
  tmp.querySelectorAll('script').forEach(oldScript=>{
    const s = document.createElement('script');
    if(oldScript.src) s.src = oldScript.src;
    else s.textContent = oldScript.textContent;
    document.head.appendChild(s);
  });
  placeholder.remove();
}

fetch('nav.html')
  .then(r=>r.text())
  .then(injectNav)
  .catch(()=>console.warn('nav.html not found'));
</script>
</body>
</html>
